<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>농기계 임대 현황</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
:root{--bg:#0f1117;--surface:#1a1d27;--card:#21253a;--border:#2e3350;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--text:#e2e8f0;--muted:#64748b;--accent:#6366f1;--dim:#94a3b8;--본소:#60a5fa;--북부:#a78bfa;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:0 0 40px}

/* ── 헤더 ── */
header{padding:14px 16px 10px;border-bottom:1px solid var(--border);background:#13162290;position:sticky;top:0;z-index:200;backdrop-filter:blur(12px)}
header h1{font-size:clamp(15px,4vw,20px);font-weight:900;color:#fff;letter-spacing:-0.5px}
header h1 span{color:var(--accent)}
.sub{font-size:11px;color:var(--muted);margin-top:2px}
.site-tabs{display:flex;gap:6px;margin-top:10px}
.stab{padding:5px 16px;border-radius:18px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.stab:hover{border-color:var(--accent);color:#fff}
.stab.a-전체{background:var(--accent);border-color:var(--accent);color:#fff}
.stab.a-본소{background:var(--본소);border-color:var(--본소);color:#fff}
.stab.a-북부{background:var(--북부);border-color:var(--북부);color:#fff}

/* ── 동기화 ── */
.sync-bar{display:flex;align-items:center;justify-content:space-between;padding:5px 14px;background:var(--surface);border-bottom:1px solid var(--border);font-size:11px}
.sync-left{display:flex;align-items:center;gap:6px}
.sdot{width:7px;height:7px;border-radius:50%}
.sdot.idle{background:var(--muted)}.sdot.ok{background:var(--green)}.sdot.saving{background:var(--yellow);animation:blink .8s infinite}.sdot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stxt{color:var(--dim)}
.btn-sync{padding:3px 10px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.btn-sync:hover{border-color:var(--accent);color:var(--accent)}

/* ── 날짜 탭 ── */
.date-scroll{overflow-x:auto;scrollbar-width:none;padding:10px 12px 0;background:var(--surface);border-bottom:1px solid var(--border)}
.date-scroll::-webkit-scrollbar{display:none}
.date-tabs{display:flex;gap:5px;width:max-content;padding-bottom:10px}
.dtab{display:flex;flex-direction:column;align-items:center;padding:6px 10px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;min-width:50px}
.dtab:hover{border-color:var(--accent)}.dtab.active{border-color:var(--accent);background:rgba(99,102,241,.15)}
.dtab .tl{font-size:8px;color:var(--accent);font-weight:700}
.dtab .day{font-size:16px;font-weight:900;color:#fff;line-height:1.1}
.dtab .dow{font-size:9px;color:var(--muted);margin-top:1px}
.dtab .chip{font-size:8px;font-weight:700;margin-top:3px;padding:1px 5px;border-radius:6px;font-family:'JetBrains Mono',monospace}
.dtab.active .day{color:var(--accent)}
.chip-정상{background:rgba(34,197,94,.15);color:var(--green)}
.chip-주의{background:rgba(245,158,11,.15);color:var(--yellow)}
.chip-마감{background:rgba(239,68,68,.15);color:var(--red)}

/* ── 레이아웃 ── */
.body{padding:12px}.layout{display:flex;gap:12px;flex-wrap:wrap}
.col-left{flex:1 1 290px;display:flex;flex-direction:column;gap:10px}
.col-right{flex:2 1 360px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:11px;display:flex;align-items:center;gap:5px}
.card-title::before{content:'';display:inline-block;width:3px;height:11px;background:var(--accent);border-radius:2px}
.date-bar{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:700;color:var(--accent);margin-bottom:11px;text-align:center}

/* ── 근무자 ── */
.site-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px}
.site-block:last-child{margin-bottom:0}
.site-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.site-lbl{font-size:11px;font-weight:700;padding:2px 9px;border-radius:8px}
.site-lbl.본소{background:rgba(96,165,250,.15);color:var(--본소)}
.site-lbl.북부{background:rgba(167,139,250,.15);color:var(--북부)}
.site-avail{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--green);font-weight:700}
.worker-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.worker-item{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 9px}
.wname{font-size:11px;font-weight:700;color:#fff;margin-bottom:4px}
.type-임기제{color:var(--blue)!important}.type-기간제{color:var(--accent)!important}
select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:11px;padding:4px 6px;outline:none;transition:border-color .2s}
select:focus{border-color:var(--accent)}
.avail-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 11px;display:flex;justify-content:space-between;align-items:center;margin-top:7px}
.avail-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--green)}
.avail-lbl{font-size:10px;color:var(--muted)}.avail-sub{font-size:9px;color:var(--muted);text-align:right}

/* ── 게이지 ── */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:18px;font-size:12px;font-weight:700;margin-bottom:9px;transition:all .3s}
.status-badge .dot{width:7px;height:7px;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.s-정상{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}.s-정상 .dot{background:var(--green)}
.s-주의{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid rgba(245,158,11,.3)}.s-주의 .dot{background:var(--yellow)}
.s-마감{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}.s-마감 .dot{background:var(--red)}
.gauge-track{height:24px;background:var(--surface);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.gauge-bar{height:100%;border-radius:12px;transition:width .6s cubic-bezier(.4,0,.2,1),background .4s;display:flex;align-items:center;justify-content:flex-end;padding-right:9px;min-width:0}
.gauge-bar span{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#fff}
.gauge-marks{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);padding:2px 3px 0}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:9px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
.stat-box .val{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:#fff}
.stat-box .lbl{font-size:9px;color:var(--muted);margin-top:2px}

/* ── 3주 테이블 ── */
.mini-table{width:100%;border-collapse:collapse;font-size:10px}
.mini-table th{padding:4px;text-align:center;background:var(--surface);color:var(--muted);font-weight:700;border-bottom:1px solid var(--border)}
.mini-table td{padding:3px 4px;text-align:center;border-bottom:1px solid var(--border);color:var(--dim);cursor:pointer;transition:background .15s}
.mini-table tr:hover td{background:rgba(99,102,241,.07)}.mini-table tr.cur-row td{background:rgba(99,102,241,.12)}
.mini-table td.d-col{font-weight:700;color:#fff}.mini-table td.today-col{color:var(--accent);font-weight:900}

/* ══════════════════════════════════════
   오른쪽 패널 — 와이어프레임 구조
══════════════════════════════════════ */

/* ② 기종 검색 드롭다운 */
.search-wrap{position:relative;margin-bottom:10px}
.search-inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:9px 36px 9px 12px;outline:none;transition:border-color .2s;cursor:pointer}
.search-inp:focus{border-color:var(--accent)}
.search-arrow{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:11px}
.dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:10px;z-index:100;max-height:260px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.dropdown.open{display:block}
.dropdown::-webkit-scrollbar{width:3px}.dropdown::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.dd-item{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;cursor:pointer;transition:background .15s;font-size:12px}
.dd-item:hover{background:rgba(99,102,241,.1)}
.dd-item .dd-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dd-item .dd-mins{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;margin-left:8px}
.dd-filter{padding:8px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card)}
.dd-filter input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:5px 8px;outline:none}
.dd-filter input:focus{border-color:var(--accent)}

/* ③ 선택된 기종 입력 행 */
.input-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:none}
.input-row.visible{display:block}
.input-row-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.input-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.half-toggle{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;padding:5px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);transition:all .2s}
.half-toggle:hover{border-color:var(--yellow)}
.half-toggle.on{border-color:var(--yellow);background:rgba(245,158,11,.1)}
.half-toggle input{display:none}
.half-toggle-box{width:14px;height:14px;border:1px solid var(--border);border-radius:3px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:transparent;transition:all .2s;flex-shrink:0}
.half-toggle.on .half-toggle-box{background:var(--yellow);border-color:var(--yellow);color:#000}
.half-toggle-txt{font-size:11px;color:var(--muted);transition:color .2s;white-space:nowrap}
.half-toggle.on .half-toggle-txt{color:var(--yellow)}
.half-mins{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap}
.half-mins.on{color:var(--yellow)}
.cnt-ctrl{display:flex;align-items:center;gap:4px}
.btn-c{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.btn-c:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.cnt-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:#fff;width:28px;text-align:center}
.btn-add{padding:6px 16px;background:var(--accent);border:none;border-radius:7px;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;margin-left:auto}
.btn-add:hover{background:#5254d4}
.btn-add:active{transform:scale(.97)}

/* ④ 선택 기종 목록 */
.sel-list{display:flex;flex-direction:column;gap:5px;max-height:300px;overflow-y:auto;padding-right:2px}
.sel-list::-webkit-scrollbar{width:3px}.sel-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sel-item{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--surface);border-radius:8px}
.sel-item.full{border-left:3px solid var(--accent)}
.sel-item.half{border-left:3px solid var(--yellow)}
.sel-item-info{flex:1;min-width:0}
.sel-item-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sel-item-meta{font-size:10px;color:var(--muted);margin-top:1px}
.sel-item-meta .tag{display:inline-block;padding:0px 5px;border-radius:4px;font-size:9px;font-weight:700;margin-right:3px}
.tag-full{background:rgba(99,102,241,.15);color:var(--accent)}
.tag-half{background:rgba(245,158,11,.15);color:var(--yellow)}
.tag-site{background:rgba(100,116,139,.15);color:var(--muted)}
.sel-mins{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;flex-shrink:0}
.sel-item.full .sel-mins{color:var(--accent)}
.sel-item.half .sel-mins{color:var(--yellow)}
.btn-del{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.btn-del:hover{background:var(--red);border-color:var(--red);color:#fff}
.empty-msg{text-align:center;color:var(--muted);font-size:12px;padding:20px 0}
.btn-reset-all{width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-reset-all:hover{border-color:var(--red);color:var(--red)}

/* 로딩 */
.loading-overlay{position:fixed;inset:0;background:rgba(15,17,23,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:14px}
.loading-overlay.hidden{display:none}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--dim)}
@media(max-width:600px){.worker-grid{grid-template-columns:1fr 1fr}.stats-row{grid-template-columns:repeat(3,1fr)}.input-controls{gap:6px}}

/* ── 토큰 설정 모달 ── */
.token-modal{position:fixed;inset:0;background:rgba(15,17,23,.95);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.token-modal.hidden{display:none}
.token-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;max-width:420px}
.token-box h2{font-size:16px;font-weight:900;color:#fff;margin-bottom:6px}
.token-box p{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.token-box .steps{font-size:11px;color:var(--dim);margin-bottom:16px;padding:10px 12px;background:var(--surface);border-radius:8px;line-height:2}
.token-inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 12px;outline:none;margin-bottom:10px;transition:border-color .2s}
.token-inp:focus{border-color:var(--accent)}
.btn-token-save{width:100%;padding:11px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-token-save:hover{background:#5254d4}
.token-reset{font-size:10px;color:var(--muted);text-align:center;margin-top:8px;cursor:pointer;text-decoration:underline}
.token-reset:hover{color:var(--dim)}
</style>
</head>
<body>

<!-- 비밀번호 로그인 모달 -->
<div class="token-modal" id="tokenModal">
  <div class="token-box">
    <h2>🚜 농기계 임대 현황</h2>
    <p>파주시 농업기계임대사업소<br>접속 비밀번호를 입력하세요</p>
    <input type="password" class="token-inp" id="tokenInp" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')saveToken()">
    <button class="btn-token-save" onclick="saveToken()">접속</button>
    <div id="loginError" style="color:var(--red);font-size:12px;text-align:center;margin-top:8px;display:none">비밀번호가 틀렸습니다</div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-txt">데이터 불러오는 중…</div>
</div>

<header>
  <h1>🚜 농기계 <span>임대 현황</span></h1>
  <div class="sub" id="headerSub">파주시 농업기계임대사업소</div>
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-top:10px">
    <div class="site-tabs" style="margin-top:0">
      <button class="stab a-전체" onclick="setSite('전체')">전체</button>
      <button class="stab" onclick="setSite('본소')">본소</button>
      <button class="stab" onclick="setSite('북부')">북부</button>
    </div>
    <div style="display:flex;gap:6px">
    <button onclick="downloadReport()" style="padding:4px 12px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);border-radius:14px;color:#22c55e;font-family:'Noto Sans KR',sans-serif;font-size:11px;cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(34,197,94,.25)'" onmouseout="this.style.background='rgba(34,197,94,.15)'">📊 엑셀 다운로드</button>
    <button onclick="clearToken()" style="padding:4px 12px;background:transparent;border:1px solid var(--border);border-radius:14px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:11px;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">🔒 로그아웃</button>
  </div>
  </div>
</header>

<div class="sync-bar">
  <div class="sync-left"><div class="sdot idle" id="sdot"></div><span class="stxt" id="stxt">불러오는 중…</span></div>
  <button class="btn-sync" onclick="loadData()">🔄 새로고침</button>
</div>

<div class="date-scroll"><div class="date-tabs" id="dateTabs"></div></div>

<div class="body">
  <div class="date-bar" id="dateBar">오늘</div>
  <div class="layout">

    <!-- 왼쪽 -->
    <div class="col-left">
      <div class="card">
        <div class="card-title">근무자 현황</div>
        <div id="workerBlocks"></div>
        <div class="avail-box">
          <div><div class="avail-lbl">총 가용 정비시간</div><div class="avail-sub" id="availDetail">–</div></div>
          <div style="text-align:right"><div class="avail-val" id="availHours">–</div><div class="avail-sub">h&nbsp;(<span id="availMins">–</span>분)</div></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">업무 부하율</div>
        <div class="status-badge s-정상" id="statusBadge"><span class="dot"></span><span id="statusText">정상 — 접수 가능</span></div>
        <div style="position:relative;height:7px;margin-bottom:2px">
          <div style="position:absolute;left:80%;width:1px;height:7px;background:var(--muted);opacity:.4"></div>
          <div style="position:absolute;left:100%;width:1px;height:7px;background:var(--muted);opacity:.4"></div>
        </div>

function today(){const d=new Date();d.setHours(0,0,0,0);return d;}
function getDates(){return Array.from({length:21},(_,i)=>{const d=new Date(today());d.setDate(today().getDate()+i);return d;});}

// state[dk][site] = { workers:{}, entries:[{name,half,qty,mins}] }
function emptyDay(){
  const s={};
  SITES.forEach(st=>{
    s[st]={workers:{},entries:[]};
    WDEF[st].forEach(w=>s[st].workers[w.id]=420);
  });
  return s;
}
function ensureDay(dk){if(!state[dk])state[dk]=emptyDay();}
function initState(){getDkeys().forEach(dk=>ensureDay(dk));}

// ─── GitHub ───
function setSyncUI(mode,msg){document.getElementById('sdot').className='sdot '+mode;document.getElementById('stxt').textContent=msg;}

async function loadData(){
  if(!checkToken()) return;
  setSyncUI('saving','불러오는 중…');
  // 토큰 모달이 열려있으면 로딩 오버레이 표시 안 함
  const tokenModalOpen = !document.getElementById('tokenModal').classList.contains('hidden');
  if(!tokenModalOpen) document.getElementById('loadingOverlay').classList.remove('hidden');
  try{
    const res = await fetch(GH_API+'?t='+Date.now(), {
      headers: {
        Authorization: 'token '+GH_TOKEN,
        Accept: 'application/vnd.github.v3+json'
      }
    });
    if(res.status === 404){
      initState();
      ghSha = null;
      setSyncUI('ok','첫 실행 — 입력 후 자동 저장됩니다');
    } else if(res.ok){
      const json = await res.json();
      ghSha = json.sha;
      // base64 디코딩
      const jsonStr = decodeURIComponent(escape(atob(json.content.replace(/\n/g,''))));
      const decoded = JSON.parse(jsonStr);
      // 빈 상태로 초기화 후 복원
      initState();
      Object.keys(decoded).forEach(dk => {
        ensureDay(dk);
        ['본소','북부'].forEach(st => {
          if(!decoded[dk] || !decoded[dk][st]) return;
          const src = decoded[dk][st];
          // workers 복원
          if(src.workers){
            Object.keys(src.workers).forEach(wid => {
              state[dk][st].workers[wid] = src.workers[wid];
            });
          }
          // entries 복원
          if(Array.isArray(src.entries)){
            state[dk][st].entries = src.entries;
          }
        });
      });
      setSyncUI('ok','동기화 완료 · '+new Date().toLocaleTimeString('ko-KR'));
    } else {
      throw new Error('HTTP '+res.status);
    }
  } catch(e){
    setSyncUI('err','불러오기 실패: '+e.message);
  }
  document.getElementById('loadingOverlay').classList.add('hidden');
  renderAll();
}

async function saveData(){
  // 토큰 없으면 저장 안 함 (로그인 전 데이터 덮어쓰기 방지)
  if(!GH_TOKEN) { setSyncUI('idle','로그인 필요'); return; }
  setSyncUI('saving','저장 중…');
  // 범위 제한 없이 전체 state 저장 (날짜 잘림 방지)
  const trimmed = JSON.parse(JSON.stringify(state));
  const jsonStr = JSON.stringify(trimmed, null, 2);
  const content = btoa(unescape(encodeURIComponent(jsonStr)));
  const body = {
    message: 'update '+new Date().toISOString(),
    content: content,
    ...(ghSha ? {sha: ghSha} : {})
  };
  try{
    const res = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        Authorization: 'token '+GH_TOKEN,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    ghSha = json.content.sha;
    setSyncUI('ok','저장 완료 · '+new Date().toLocaleTimeString('ko-KR'));
  } catch(e){
    setSyncUI('err','저장 실패: '+e.message);
  }
}


// ═══ 엑셀 리포트 다운로드 ═══
function downloadReport(){
  const DATES = getDates();
  const DKEYS = getDkeys();

  // ── 시트1: 일자별 부하 현황 ──
  let s1 = '날짜,요일,전체부하율(%),전체상태,본소부하율(%),본소상태,북부부하율(%),북부상태,전체소요(분),본소소요(분),북부소요(분),전체가용(분),본소가용(분),북부가용(분)\n';
  const DOW2 = ['일','월','화','수','목','금','토'];
  DKEYS.forEach((dk,i) => {
    ensureDay(dk);
    const d = DATES[i];
    const pa = getPct(dk,'전체'), pb = getPct(dk,'본소'), pn = getPct(dk,'북부');
    const ua = getUsed(dk,'전체'), ub = getUsedSite(dk,'본소'), un = getUsedSite(dk,'북부');
    const aa = getAvail(dk,'전체'), ab = getAvailSite(dk,'본소'), an = getAvailSite(dk,'북부');
    s1 += [
      (d.getMonth()+1)+'/'+d.getDate(),
      DOW2[d.getDay()]+'요일',
      pa, getStatus(pa),
      pb, getStatus(pb),
      pn, getStatus(pn),
      ua, ub, un,
      aa, ab, an
    ].join(',') + '\n';
  });

  // ── 시트2: 임대 건수 상세 ──
  let s2 = '날짜,사업소,기종명,건수,전반타임,1건당정비시간(분),소계(분)\n';
  DKEYS.forEach((dk,i) => {
    ensureDay(dk);
    const d = DATES[i];
    ['본소','북부'].forEach(st => {
      state[dk][st].entries.forEach(e => {
        s2 += [
          (d.getMonth()+1)+'/'+d.getDate(),
          st,
          '"'+e.name+'"',
          e.qty,
          e.half ? '반타임' : '전타임',
          e.mins,
          e.mins * e.qty
        ].join(',') + '\n';
      });
    });
  });

  // ── 시트3: 기종별 집계 ──
  const typeMap = {};
  DKEYS.forEach(dk => {
    ensureDay(dk);
    ['본소','북부'].forEach(st => {
      state[dk][st].entries.forEach(e => {
        const key = e.name + '|' + (e.half?'반타임':'전타임') + '|' + st;
        if(!typeMap[key]) typeMap[key] = {name:e.name, type:e.half?'반타임':'전타임', site:st, qty:0, totalMins:0};
        typeMap[key].qty += e.qty;
        typeMap[key].totalMins += e.mins * e.qty;
      });
    });
  });
  let s3 = '기종명,전반타임,사업소,총건수,총정비시간(분),총정비시간(h)\n';
  Object.values(typeMap).sort((a,b)=>b.qty-a.qty).forEach(r => {
    s3 += ['"'+r.name+'"', r.type, r.site, r.qty, r.totalMins, (r.totalMins/60).toFixed(1)].join(',') + '\n';
  });

  // ── 시트4: 근무자 현황 ──
  let s4 = '날짜,사업소,임기제1(분),임기제2(분),기간제1(분),기간제2(분),가용합계(분),가용합계(h)\n';
  const wIds = {본소:['bs1','bs2','bs3','bs4'], 북부:['nb1','nb2','nb3','nb4']};
  DKEYS.forEach((dk,i) => {
    ensureDay(dk);
    const d = DATES[i];
    ['본소','북부'].forEach(st => {
      const w = state[dk][st].workers;
      const ids = wIds[st];
      const total = ids.reduce((s,id)=>s+(w[id]||0),0);
      s4 += [
        (d.getMonth()+1)+'/'+d.getDate(),
        st,
        w[ids[0]]||0, w[ids[1]]||0, w[ids[2]]||0, w[ids[3]]||0,
        total, (total/60).toFixed(1)
      ].join(',') + '\n';
    });
  });

  // ── CSV 파일로 묶어서 다운로드 (시트별 개별 파일) ──
  const today = new Date();
  const dateStr = today.getFullYear()+'-'+(today.getMonth()+1)+'-'+today.getDate();

  const files = [
    {name: `농기계임대현황_일자별부하_${dateStr}.csv`, content: '\uFEFF'+s1},
    {name: `농기계임대현황_임대상세_${dateStr}.csv`,   content: '\uFEFF'+s2},
    {name: `농기계임대현황_기종별집계_${dateStr}.csv`, content: '\uFEFF'+s3},
    {name: `농기계임대현황_근무자현황_${dateStr}.csv`, content: '\uFEFF'+s4},
  ];

  files.forEach(f => {
    const blob = new Blob([f.content], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = f.name;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  setSyncUI('ok', '📊 CSV 4개 다운로드 완료!');
}

function scheduleSave(){
  if(!GH_TOKEN) return;if(saveTimer)clearTimeout(saveTimer);setSyncUI('saving','변경됨…');saveTimer=setTimeout(saveData,1000);}

// ─── 계산 ───
function getAvailSite(dk,st){return Object.values(state[dk][st].workers).reduce((a,b)=>a+b,0);}
function getAvail(dk,st){if(st==='전체')return SITES.reduce((s,x)=>s+getAvailSite(dk,x),0);return getAvailSite(dk,st);}
function getUsedSite(dk,st){return state[dk][st].entries.reduce((s,e)=>s+e.mins*e.qty,0);}
function getUsed(dk,st){if(st==='전체')return SITES.reduce((s,x)=>s+getUsedSite(dk,x),0);return getUsedSite(dk,st);}
function getPct(dk,st){const a=getAvail(dk,st);return a?Math.round(getUsed(dk,st)/a*100):0;}
function getStatus(p){return p>=100?'마감':p>=80?'주의':'정상';}

// ─── 드롭다운 ───
function openDD(){
  document.getElementById('dropdown').classList.toggle('open');
  if(document.getElementById('dropdown').classList.contains('open')){
    document.getElementById('ddFilter').value='';
    filterDD();
    setTimeout(()=>document.getElementById('ddFilter').focus(),50);
  }
}
function filterDD(){
  const q=document.getElementById('ddFilter').value.toLowerCase();
  document.getElementById('ddList').innerHTML=MACHINES.filter(m=>m.n.toLowerCase().includes(q)).map(m=>
    '<div class="dd-item" onclick="selectMachine(\''+m.n+'\')"><span class="dd-name">'+m.n+'</span><span class="dd-mins">'+m.m+'분</span></div>'
  ).join('');
}
function selectMachine(name){
  selMachine=name; selHalf=false; selQty=1;
  document.getElementById('searchInp').value=name;
  document.getElementById('dropdown').classList.remove('open');
  document.getElementById('inputRow').classList.add('visible');
  document.getElementById('inputRowName').textContent=name;
  document.getElementById('halfToggle').classList.remove('on');
  document.getElementById('halfCheck').checked=false;
  document.getElementById('qtyVal').textContent='1';
  updateHalfLabel();
}
function toggleHalf(){
  selHalf=!selHalf;
  const tog=document.getElementById('halfToggle');
  tog.classList.toggle('on',selHalf);
  document.getElementById('halfCheck').checked=selHalf;
  updateHalfLabel();
}
function updateHalfLabel(){
  if(!selMachine)return;
  const base=MMAP[selMachine]||0;
  const mins=selHalf?base/2:base;
  const lbl=document.getElementById('halfMinsLabel');
  lbl.textContent=mins+'분'+(selHalf?' (반타임)':'');
  lbl.className='half-mins'+(selHalf?' on':'');
}
function changeQty(d){
  selQty=Math.max(1,selQty+d);
  document.getElementById('qtyVal').textContent=selQty;
}
function addEntry(){
  if(!selMachine) return;
  if(!GH_TOKEN) return;
  const dk = getDkeys()[curIdx];
  const site = curSite==='전체' ? '본소' : curSite;
  const base = MMAP[selMachine] || 0;
  const mins = selHalf ? base/2 : base;
  state[dk][site].entries.push({name:selMachine, half:selHalf, qty:selQty, mins});
  // 즉시 저장 (딜레이 없이)
  if(saveTimer) clearTimeout(saveTimer);
  saveData();
  // 입력창 초기화
  selQty=1; selHalf=false;
  document.getElementById('qtyVal').textContent='1';
  document.getElementById('halfToggle').classList.remove('on');
  document.getElementById('halfCheck').checked=false;
  updateHalfLabel();
  renderGauge(); renderSelList(); renderDateTabs(); renderMiniTable();
}

function delEntry(site,idx){
  const dk = getDkeys()[curIdx];
  state[dk][site].entries.splice(idx,1);
  if(saveTimer) clearTimeout(saveTimer);
  saveData();
  renderAll();
}

function setSite(s){
  curSite=s;
  document.querySelectorAll('.stab').forEach(t=>{t.className='stab';if(t.textContent===s)t.classList.add('a-'+s);});
  renderAll();
}
function setIdx(i){curIdx=i;renderAll();}

function renderAll(){
  const DATES=getDates(),DKEYS=getDkeys();
  DKEYS.forEach(dk=>ensureDay(dk));
  renderDateTabs();
  const d=DATES[curIdx],dk=DKEYS[curIdx];
  document.getElementById('dateBar').textContent='📅 '+d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+DOW[d.getDay()]+'요일)'+(isToday(d)?' — 오늘':'');
  renderWorkers();renderGauge();renderSelList();renderMiniTable();
}

function renderDateTabs(){
  const DATES=getDates(),DKEYS=getDkeys();
  document.getElementById('dateTabs').innerHTML=DATES.map((d,i)=>{
    const pct=getPct(DKEYS[i],curSite),st=getStatus(pct);
    return '<div class="dtab'+(i===curIdx?' active':'')+'" onclick="setIdx('+i+')">'+(isToday(d)?'<div class="tl">TODAY</div>':'')+'<div class="day">'+d.getDate()+'</div><div class="dow">'+DOW[d.getDay()]+'</div><div class="chip chip-'+st+'">'+pct+'%</div></div>';
  }).join('');
}

function renderWorkers(){
  const dk=getDkeys()[curIdx];
  const showSites=curSite==='전체'?SITES:[curSite];
  document.getElementById('workerBlocks').innerHTML=showSites.map(st=>{
    const av=getAvailSite(dk,st);
    const workers=WDEF[st].map(w=>'<div class="worker-item"><div class="wname type-'+w.type+'">'+w.name+' <span style="font-size:9px;opacity:.5">'+w.type+'</span></div><select onchange="state[\''+dk+'\'][\''+st+'\'].workers[\''+w.id+'\']=+this.value;scheduleSave();renderAll()">'+SCHED.map(o=>'<option value="'+o.value+'"'+(state[dk][st].workers[w.id]===o.value?' selected':'')+'>'+o.label+'</option>').join('')+'</select></div>').join('');
    return '<div class="site-block"><div class="site-hdr"><span class="site-lbl '+st+'">'+st+'</span><span class="site-avail">'+av+'분 ('+(av/60).toFixed(1)+'h)</span></div><div class="worker-grid">'+workers+'</div></div>';
  }).join('');
  const avail=getAvail(dk,curSite);
  const active=showSites.reduce((s,st)=>s+Object.values(state[dk][st].workers).filter(v=>v>0).length,0);
  document.getElementById('availHours').textContent=(avail/60).toFixed(1);
  document.getElementById('availMins').textContent=avail;
  document.getElementById('availDetail').textContent='근무 '+active+'명 합계';
}

function renderGauge(){
  const dk=getDkeys()[curIdx];
  const avail=getAvail(dk,curSite),used=getUsed(dk,curSite),pct=getPct(dk,curSite),remain=avail-used,st=getStatus(pct);
  const col=st==='마감'?'var(--red)':st==='주의'?'var(--yellow)':'var(--green)';
  const bar=document.getElementById('gaugeBar');bar.style.width=Math.min(pct,100)+'%';bar.style.background=col;
  document.getElementById('gaugeTxt').textContent=pct+'%';
  document.getElementById('statusBadge').className='status-badge s-'+st;
  document.getElementById('statusText').textContent={정상:'✅ 정상 — 접수 가능',주의:'⚠ 주의 — 신중 검토 필요',마감:'🚫 신청 마감 — 금일 접수 불가'}[st];
  document.getElementById('statPct').innerHTML=pct+'<span style="font-size:10px">%</span>';
  document.getElementById('statUsed').textContent=used;
  const re=document.getElementById('statRemain');re.textContent=remain>=0?remain:'초과';re.style.color=remain<0?'var(--red)':'#fff';
}

function renderSelList(){
  const dk=getDkeys()[curIdx];
  const showSites=curSite==='전체'?SITES:[curSite];
  const el=document.getElementById('selList');
  let html='';
  showSites.forEach(st=>{
    state[dk][st].entries.forEach((e,i)=>{
      const totalMins=e.mins*e.qty;
      html+='<div class="sel-item '+(e.half?'half':'full')+'">'
        +'<div class="sel-item-info">'
        +'<div class="sel-item-name">'+e.name+' × '+e.qty+'</div>'
        +'<div class="sel-item-meta">'
        +(e.half?'<span class="tag tag-half">반타임 '+e.mins+'분</span>':'<span class="tag tag-full">전타임 '+e.mins+'분</span>')
        +(curSite==='전체'?'<span class="tag tag-site">'+st+'</span>':'')
        +'</div></div>'
        +'<span class="sel-mins">'+totalMins+'분</span>'
        +'<button class="btn-del" onclick="delEntry(\''+st+'\','+i+')" title="삭제">✕</button>'
        +'</div>';
    });
  });
  el.innerHTML=html||'<div class="empty-msg">기종을 선택 후 입력하세요</div>';
}

function renderMiniTable(){
  const DATES=getDates(),DKEYS=getDkeys();
  document.getElementById('miniBody').innerHTML=DKEYS.map((k,i)=>{
    const dd=DATES[i],pa=getPct(k,'전체'),pb=getPct(k,'본소'),pn=getPct(k,'북부'),sa=getStatus(pa),tod=isToday(dd);
    return '<tr class="'+(i===curIdx?'cur-row':'')+'" onclick="setIdx('+i+')"><td class="d-col'+(tod?' today-col':'')+'">'+fmtDate(dd)+(tod?' ★':'')+'</td><td style="color:var(--muted)">'+DOW[dd.getDay()]+'</td><td><span class="chip chip-'+sa+'" style="padding:1px 5px">'+pa+'%</span></td><td><span class="chip chip-'+getStatus(pb)+'" style="padding:1px 5px">'+pb+'%</span></td><td><span class="chip chip-'+getStatus(pn)+'" style="padding:1px 5px">'+pn+'%</span></td><td><span class="chip chip-'+sa+'" style="padding:1px 5px">'+sa+'</span></td></tr>';
  }).join('');
}

function resetDay(){
  const dk=getDkeys()[curIdx];
  const showSites=curSite==='전체'?SITES:[curSite];
  showSites.forEach(st=>state[dk][st].entries=[]);
  scheduleSave();renderAll();
}

// 드롭다운 외부 클릭 닫기
document.addEventListener('click',e=>{
  if(!document.getElementById('searchWrap').contains(e.target)){
    document.getElementById('dropdown').classList.remove('open');
  }
});

// 초기 드롭다운 목록 채우기
filterDD();

const t=today();
// ?reset=1 이면 로그인 초기화
const _urlP = new URLSearchParams(window.location.search);
if(_urlP.get('reset')==='1'){
  localStorage.removeItem('gh_auth');
  document.getElementById('loadingOverlay').classList.add('hidden');
  window.history.replaceState({}, document.title, window.location.pathname);
}

// 이전에 로그인한 적 있으면 자동 로그인
if(localStorage.getItem('gh_auth') === 'ok') {
  GH_TOKEN = REAL_TOKEN;
  document.getElementById('tokenModal').classList.add('hidden');
  loadData();
} else {
  // 로그아웃 상태 - 로딩 오버레이 완전히 숨기고 비밀번호창 표시
  document.getElementById('loadingOverlay').classList.add('hidden');
  document.getElementById('tokenModal').classList.remove('hidden');
  initState();
  renderAll();
}
document.getElementById('headerSub').textContent='파주시 농업기계임대사업소 · '+t.getFullYear()+'년 '+(t.getMonth()+1)+'월 '+t.getDate()+'일';
loadData();
</script>
</body>
</html>
