    else if(col.offset === 0) sub = [colOut?`출고(${colOut}건)`:'', colIn?`입고(${colIn}건)`:''].filter(Boolean).join(' ') || '없음';
    else if(col.offset === 1) sub = colOut ? `출고(${colOut}건)` : '없음';
    colHeaderHtml += `<th style="padding:6px 8px;border:1px solid var(--border);color:${color};font-weight:700;text-align:center;min-width:100px">
      ${dateStr}${isHol?' 🔴':''}<br>
      <span style="font-size:10px;font-weight:400;color:var(--muted)">${sub}</span>
    </th>`;
  });

  // ── 행 정렬 ──
  // 날짜 → [입고(2일↑)] → [출입고(1일)] → [출고(2일↑)] → 성명그룹 → 장비명
  function getTaskGroup(t) {
    // 0: 다일임대 입고, 1: 1일임대 출입고, 2: 다일임대 출고
    if(t.showIn  && t.entry.days >= 2) return 0;
    if(t.showOut && t.entry.days === 1) return 1;
    if(t.showOut && t.entry.days >= 2) return 2;
    return 1;
  }
  function getTaskDate(t) {
    // 그룹별 기준 날짜
    if(getTaskGroup(t) === 0) return t.inDk;   // 입고일
    if(getTaskGroup(t) === 2) return t.outDk;  // 출고일
    return t.outDk; // 1일임대
  }
  tasks.sort((a,b) => {
    const aDate = getTaskDate(a);
    const bDate = getTaskDate(b);
    // 1순위: 날짜
    if(aDate !== bDate) return aDate < bDate ? -1 : 1;
    // 2순위: 그룹 (입고→1일→출고)
    const ag = getTaskGroup(a), bg2 = getTaskGroup(b);
    if(ag !== bg2) return ag - bg2;
    // 3순위: 성명 그룹
    const aName = a.entry.personName || '';
    const bName = b.entry.personName || '';
    if(aName !== bName) return aName.localeCompare(bName, 'ko');
    // 4순위: 장비명
    return a.entry.equipName.localeCompare(b.entry.equipName, 'ko');
  });

  // ── 행 생성 ──
  let rowsHtml = '';
  if(tasks.length === 0) {
    rowsHtml = `<tr><td colspan="${cols.length+3}" style="padding:20px;text-align:center;color:var(--muted);border:1px solid var(--border)">미완결 작업 없음 ✅</td></tr>`;
  } else {
    tasks.forEach((t, ri) => {
      const e = t.entry;
      const bg = ri%2===0 ? 'var(--surface)' : 'var(--card)';

      let colCells = '';
      cols.forEach(col => {
        let cell = '';
        let cellStyle = `padding:7px 8px;border:1px solid var(--border);text-align:center`;

        // 출고 표시
        if(t.showOut && t.outDk === col.dk) {
          cell += `<label style="display:inline-flex;align-items:center;gap:3px;cursor:pointer;margin:2px">
            <input type="checkbox" ${e.outDone?'checked':''} 
              onchange="toggleEntryCheckPopup('${e.startDate}','${t.site}','${e.id}','out',this.checked)" style="cursor:pointer">
            <span style="font-size:11px;color:var(--blue)">출고 →</span>
          </label>`;
        }
        // 입고 표시
        if(t.showIn && t.inDk === col.dk) {
          cell += `<label style="display:inline-flex;align-items:center;gap:3px;cursor:pointer;margin:2px">
            <input type="checkbox" ${e.inDone?'checked':''}
              onchange="toggleEntryCheckPopup('${e.startDate}','${t.site}','${e.id}','in',this.checked)" style="cursor:pointer">
            <span style="font-size:11px;color:var(--green)">← 입고</span>
          </label>`;
        }
        // 임대 중간 기간 표시 (출고됐고 아직 입고 안 된 기간)
        if(!cell && e.outDone && !e.inDone) {
          const colDate = new Date(col.dk);
          const outDate = new Date(t.outDk);
          const inDate  = new Date(t.inDk);
          if(colDate > outDate && colDate <= inDate) {
            cell = `<span style="color:var(--blue);font-size:14px">→</span>`;
            cellStyle += ';background:rgba(96,165,250,.05)';
          }
        }

        colCells += `<td style="${cellStyle}">${cell}</td>`;
      });

      const daysLabel = e.days + '일';
      // 같은 날짜+성명이 이전 행과 같으면 성명 흐리게 표시
      const prevTask = ri > 0 ? tasks[ri-1] : null;
      const prevDate = prevTask ? getTaskDate(prevTask) : '';
      const curDate  = getTaskDate(t);
      const samePerson = prevTask &&
        prevDate === curDate &&
        getTaskGroup(prevTask) === getTaskGroup(t) &&
        prevTask.entry.personName === e.personName;
      const nameStyle = samePerson
        ? 'padding:7px 10px;border:1px solid var(--border);color:var(--muted);font-size:11px'
        : 'padding:7px 10px;border:1px solid var(--border);color:var(--dim);font-weight:600';
      const nameDisplay = samePerson ? '〃' : e.personName;
      rowsHtml += `<tr style="background:${bg}">
        <td style="padding:7px 10px;border:1px solid var(--border);color:var(--text);font-weight:600">${e.equipName}${e.delivery?"<span style=\"margin-left:5px;font-size:10px;color:var(--yellow)\">🚚</span>":""}</td>
        <td style="${nameStyle}">${nameDisplay}</td>
        ${colCells}
        <td style="padding:7px 10px;border:1px solid var(--border);color:var(--muted);font-size:10px">${daysLabel}</td>
      </tr>`;
    });
  }

  const tableHtml = `
  <div style="margin-bottom:12px;text-align:center">
    <span style="font-size:14px;font-weight:900;color:#fff">
      ${(todayD.getMonth()+1)}월 ${todayD.getDate()}일 입출고 작업 목록 (${curSite === '전체' ? '전체' : curSite})
    </span>
    <span style="font-size:12px;color:var(--blue);margin-left:10px">출고 ${totalOut}건</span>
    <span style="font-size:12px;color:var(--green);margin-left:6px">입고 ${totalIn}건</span>
  </div>
  <table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead>
      <tr style="background:var(--bg)">
        <th style="padding:8px 10px;border:1px solid var(--border);color:var(--muted);font-weight:700;min-width:130px">장비명</th>
        <th style="padding:8px 10px;border:1px solid var(--border);color:var(--muted);font-weight:700;min-width:70px">성명</th>
        ${colHeaderHtml}
        <th style="padding:8px 10px;border:1px solid var(--border);color:var(--muted);font-weight:700">기간</th>
      </tr>
    </thead>
    <tbody>${rowsHtml}</tbody>
  </table>`;

  document.getElementById('popupCols').innerHTML = tableHtml;
  document.getElementById('inoutPopup').classList.remove('hidden');
  // 현재 탭 활성화
  openInoutPopupSite(curSite);
}


function toggleEntryCheckPopup(startDk, site, entryId, type, val) {
  if(!state[startDk] || !state[startDk][site]) return;
  const entry = state[startDk][site].entries.find(e => String(e.id) === String(entryId));
  if(!entry) return;
  if(type === 'out') entry.outDone = val;
  else entry.inDone = val;
  if(saveTimer) clearTimeout(saveTimer);
  saveData();
  renderAll();
  openInoutPopup();
}


// ═══ 임대 내역 수정 ═══
let editTarget = null; // {startDk, site, idx}
let editEquip  = null;
let editDays   = 1;
let editDelivery = false;

function formatLocalDate(dateStr) {
  if(!dateStr) return '날짜 선택';
  const [y,m,d] = dateStr.split('-');
  return y+'년 '+parseInt(m)+'월 '+parseInt(d)+'일';
}


function openEditModal(startDk, site, idx) {
  const e = state[startDk][site].entries[idx];
  if(!e) return;
  editTarget = {startDk, site, idx};

  // 장비명
  document.getElementById('editSearchInp').value = e.equipName + (e.equipSpec ? ' / '+e.equipSpec : '');
  editEquip = {n: e.equipName, s: e.equipSpec||'', m: e.baseMins - (e.delivery?240:0)};

  // 성명
  document.getElementById('editPersonInp').value = e.personName || '';

  // 시작일 - T12:00:00 고정으로 timezone 보정
  const sdInput = document.getElementById('editStartDate');
  if(sdInput) {
    const sdStr = (e.startDate || editTarget.startDk).slice(0, 10);
    const fixedDate = new Date(sdStr + 'T12:00:00');
    const yyyy = fixedDate.getFullYear();
    const mm = String(fixedDate.getMonth()+1).padStart(2,'0');
    const dd = String(fixedDate.getDate()).padStart(2,'0');
    sdInput.value = yyyy+'-'+mm+'-'+dd;
  }

  // 임대기간
  editDays = e.days;
  editDelivery = e.delivery || false;
  [1,2,3].forEach(n => document.getElementById('editDayBtn'+n).classList.toggle('active', n===editDays));
  const btnX = document.getElementById('editDayBtnX');
  if(editDays > 3) { btnX.classList.add('active'); btnX.textContent = editDays+'일'; }
  else { btnX.classList.remove('active'); btnX.textContent = '📅 직접'; }
  document.getElementById('editDeliveryToggle').classList.toggle('on', editDelivery);
  document.getElementById('editDeliveryChkSq').style.background = editDelivery ? 'var(--yellow)' : '';
  updateEditHalfInfo();
  document.getElementById('editModal').classList.remove('hidden');
}

function saveRainy(arr) {
  localStorage.setItem('rainy_' + GH_REPO, JSON.stringify(arr));
}

// ═══ 우천 관리 ═══
function getRainy() {
  try { return JSON.parse(localStorage.getItem('rainy_' + GH_REPO) || '[]'); } catch(e) { return []; }
}
function saveRainy(arr) {
  localStorage.setItem('rainy_' + GH_REPO, JSON.stringify(arr));
}
function toggleRainy(dk) {
  const rainy = getRainy();
  const idx2 = rainy.indexOf(dk);
  if(idx2 === -1) rainy.push(dk); else rainy.splice(idx2, 1);
  saveRainy(rainy);
  saveData();
  renderAll();
}

function toggleRainy(dk) {
  const rainy = getRainy();
  const idx = rainy.indexOf(dk);
  if(idx === -1) rainy.push(dk); else rainy.splice(idx, 1);
  saveRainy(rainy);
  saveData(); // data.json에도 저장
  renderAll();
}

// ═══ 취소 이력 관리 ═══
let cancelTarget = null; // {site, idx, startDk}

function delEntry(site, idx, startDk) {
  const dk2 = startDk || getDkeys()[curIdx];
  if(!state[dk2] || !state[dk2][site]) return;
  const e = state[dk2][site].entries[idx];
  if(!e) return;
  // 취소 모달 표시
  cancelTarget = {site, idx, startDk: dk2};
  document.getElementById('cancelEquipName').textContent = e.equipName + ' / ' + e.personName + ' (' + e.days + '일)';
  document.getElementById('cancelModal').classList.remove('hidden');
}

function confirmCancel(reason) {
  if(!cancelTarget) return;
  const {site, idx, startDk} = cancelTarget;
  if(!state[startDk] || !state[startDk][site]) return;
  const e = state[startDk][site].entries[idx];
  if(!e) return;
  // 취소 이력 저장 - 배열 확인
  if(!Array.isArray(state._cancelled)) state._cancelled = [];
  state._cancelled.push({
    cancelledAt: new Date().toISOString(),
    reason: reason,
    equipName: e.equipName,
    equipSpec: e.equipSpec || '',
    personName: e.personName,
    days: e.days,
    startDate: e.startDate,
    site: site,
    baseMins: e.baseMins,
    delivery: e.delivery || false
  });
  // 실제 삭제
  state[startDk][site].entries.splice(idx, 1);
  cancelTarget = null;
  document.getElementById('cancelModal').classList.add('hidden');
  if(saveTimer) clearTimeout(saveTimer);
  saveData();
  renderAll();
}

function closeCancelModal() {
  cancelTarget = null;
  document.getElementById('cancelModal').classList.add('hidden');
}


function closeEditModal() {
  document.getElementById('editModal').classList.add('hidden');
  editTarget = null;
}

function setEditDays(d) {
  editDays = d;
  [1,2,3].forEach(n => document.getElementById('editDayBtn'+n).classList.toggle('active', n===d));
  const btnX = document.getElementById('editDayBtnX');
  btnX.classList.remove('active');
  btnX.textContent = '📅 직접';
  document.getElementById('editReturnDatePicker').style.display = 'none';
  updateEditHalfInfo();
}

function openEditDatePicker() {
  const dk = editTarget ? editTarget.startDk : getDkeys()[curIdx];
  const picker = document.getElementById('editReturnDatePicker');
  const minDate = new Date(dk);
  minDate.setDate(minDate.getDate() + 1);
  picker.min = minDate.toISOString().slice(0,10);
  const maxDate = new Date(dk);
  maxDate.setDate(maxDate.getDate() + 30);
  picker.max = maxDate.toISOString().slice(0,10);
  picker.value = '';
  picker.style.display = 'block';
  picker.focus(); picker.click();
}

function setEditDaysByDate(returnDate) {
  if(!returnDate || !editTarget) return;
  const start = new Date(editTarget.startDk);
  const end   = new Date(returnDate);
  const diff  = Math.round((end - start) / 86400000);
  if(diff < 1) return;
  editDays = diff;
  [1,2,3].forEach(n => document.getElementById('editDayBtn'+n).classList.remove('active'));
  const btnX = document.getElementById('editDayBtnX');
  btnX.classList.add('active');
  btnX.textContent = editDays+'일';
  document.getElementById('editReturnDatePicker').style.display = 'none';
  updateEditHalfInfo();
}

function toggleEditDelivery() {
  editDelivery = !editDelivery;
  document.getElementById('editDeliveryToggle').classList.toggle('on', editDelivery);
  document.getElementById('editDeliveryChkSq').style.background = editDelivery ? 'var(--yellow)' : 'var(--bg)';
  updateEditHalfInfo();
}

function updateEditHalfInfo() {
  if(!editEquip) return;
  const base = editEquip.m;
  const info = document.getElementById('editHalfInfo');
  const del  = editDelivery ? 240 : 0;
  if(editDays === 1) {
    info.textContent = '전타임 ' + (base+del) + '분' + (editDelivery?' (배송포함)':'');
  } else {
    info.textContent = '출고: ' + (base/2+(editDelivery?120:0)) + '분 / 입고: ' + (base/2+(editDelivery?120:0)) + '분';
  }
}

function openEditDD() {
  document.getElementById('editDropdown').classList.toggle('open');
  if(document.getElementById('editDropdown').classList.contains('open')) {
    document.getElementById('editDdFilter').value = '';
    filterEditDD();
    setTimeout(()=>document.getElementById('editDdFilter').focus(), 50);
  }
}

function filterEditDD() {
  const q = (document.getElementById('editDdFilter').value||'').toLowerCase().trim();
  const site = editTarget ? editTarget.site : (curSite==='전체'?null:curSite);
  let list = [];
  if(!site) {
    ['본소','북부'].forEach(st => EQUIP_LIST[st].forEach(e => list.push({...e,site:st})));
  } else {
    EQUIP_LIST[site].forEach(e => list.push({...e,site}));
  }
  const terms = q ? q.split(/[\s\-]+/).filter(Boolean) : [];
  const filtered = terms.length===0 ? list : list.filter(e => {
    const t = (e.n+' '+e.s).toLowerCase();
    return terms.every(w => t.includes(w));
  });
  document.getElementById('editDdList').innerHTML = filtered.map(e => {
    const status = getEquipStatus(e.n, e.site);
    const statusBadge = status === '정비중'
      ? '<span style="margin-left:6px;font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(245,158,11,.2);color:var(--yellow);font-weight:700">🔧 정비중</span>'
      : status === '임대중'
      ? '<span style="margin-left:6px;font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(239,68,68,.2);color:var(--red);font-weight:700">📤 임대중</span>'
      : status === '출고예정'
      ? '<span style="margin-left:6px;font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(96,165,250,.2);color:var(--blue);font-weight:700">📦 출고예정</span>'
      : '';
    return `<div class="dd-item" onclick='selectEditEquip(${JSON.stringify(e)})'>
      <span class="dd-name">${e.n} ${statusBadge}</span>
      <span class="dd-mins" style="font-size:10px;color:var(--muted)">${e.s}</span>
    </div>`;
  }).join('') || '<div style="padding:12px;text-align:center;color:var(--muted);font-size:12px">검색 결과 없음</div>';
}

function selectEditEquip(e) {
  editEquip = e;
  document.getElementById('editSearchInp').value = e.n + (e.s?' / '+e.s:'');
  document.getElementById('editDropdown').classList.remove('open');
  updateEditHalfInfo();
}

function saveEdit() {
  if(!editTarget || !editEquip) return;
  const person = document.getElementById('editPersonInp').value.trim();
  if(!person) {
    document.getElementById('editPersonInp').style.borderColor='var(--red)';
    document.getElementById('editPersonInp').focus();
    return;
  }
  const {startDk, site, idx} = editTarget;
  const entry = state[startDk][site].entries[idx];
  if(!entry) return;

  const deliveryMins = editDelivery ? 240 : 0;
  // editStartDate.value는 브라우저가 UTC로 해석해서 하루 빠질 수 있음
  // 원래 startDk와 비교해서 실제로 변경됐는지 확인
  const rawDate = document.getElementById('editStartDate').value;
  let newStartDate = startDk; // 기본값: 변경 없음
  if(rawDate && rawDate !== startDk) {
    // 날짜가 변경됐으면 T12:00:00 보정
    const fd = new Date(rawDate + 'T12:00:00');
    newStartDate = fd.getFullYear()+'-'+String(fd.getMonth()+1).padStart(2,'0')+'-'+String(fd.getDate()).padStart(2,'0');
  }

  entry.equipName  = editEquip.n;
  entry.equipSpec  = editEquip.s || '';
  entry.personName = person;
  entry.days       = editDays;
  entry.baseMins   = editEquip.m + deliveryMins;
  entry.delivery   = editDelivery;
  entry.startDate  = newStartDate;

  // 시작일이 바뀌면 다른 날짜 키로 이동
  if(newStartDate !== startDk) {
    ensureDay(newStartDate);
    if(!state[newStartDate][site]) state[newStartDate][site] = {workers:{}, entries:[]};
    // 새 날짜로 이동
    state[newStartDate][site].entries.push(entry);
    state[startDk][site].entries.splice(idx, 1);
  }

  if(saveTimer) clearTimeout(saveTimer);
  saveData();
  closeEditModal();
  renderAll();
}

// 드롭다운 외부 클릭 닫기 (수정 모달)
document.addEventListener('click', e => {
  if(!document.getElementById('editSearchWrap').contains(e.target)) {
    document.getElementById('editDropdown').classList.remove('open');
  }
});


function closePopup() {
  document.getElementById('inoutPopup').classList.add('hidden');
}

// 팝업 외부 클릭 닫기
document.addEventListener('click', e => {
  const popup = document.getElementById('inoutPopup');
  if (!popup.classList.contains('hidden') && e.target === popup) closePopup();
});


// 로그인 버튼 이벤트
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('loginBtn');
  if(btn) btn.addEventListener('click', saveToken);
  
  var inp1 = document.getElementById('tokenInp');
  var inp2 = document.getElementById('ghTokenInp');
  if(inp1) inp1.addEventListener('keydown', function(e){ if(e.key==='Enter') saveToken(); });
  if(inp2) inp2.addEventListener('keydown', function(e){ if(e.key==='Enter') saveToken(); });
});
window.addEventListener('resize', () => {
  clearTimeout(window._resizeTimer);
  window._resizeTimer = setTimeout(() => renderTriDayPanel(), 150);
});
