<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>농기계 임대 현황</title>
<!-- v1776847346 -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
:root{--bg:#0f1117;--surface:#1a1d27;--card:#21253a;--border:#2e3350;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--text:#e2e8f0;--muted:#64748b;--accent:#6366f1;--dim:#94a3b8;--본소:#60a5fa;--북부:#a78bfa;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:0 0 40px}

/* ── 헤더 ── */
header{padding:14px 16px 10px;border-bottom:1px solid var(--border);background:#13162290;position:sticky;top:0;z-index:200;backdrop-filter:blur(12px)}
header h1{font-size:clamp(15px,4vw,20px);font-weight:900;color:#fff;letter-spacing:-0.5px}
header h1 span{color:var(--accent)}
.sub{font-size:11px;color:var(--muted);margin-top:2px}
.site-tabs{display:flex;gap:6px;margin-top:10px}
.stab{padding:5px 16px;border-radius:18px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.stab:hover{border-color:var(--accent);color:#fff}
.stab.a-전체{background:var(--accent);border-color:var(--accent);color:#fff}
.stab.a-본소{background:var(--본소);border-color:var(--본소);color:#fff}
.stab.a-북부{background:var(--북부);border-color:var(--북부);color:#fff}

/* ── 동기화 ── */
.sync-bar{display:flex;align-items:center;justify-content:space-between;padding:5px 14px;background:var(--surface);border-bottom:1px solid var(--border);font-size:11px}
.sync-left{display:flex;align-items:center;gap:6px}
.sdot{width:7px;height:7px;border-radius:50%}
.sdot.idle{background:var(--muted)}.sdot.ok{background:var(--green)}.sdot.saving{background:var(--yellow);animation:blink .8s infinite}.sdot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stxt{color:var(--dim)}
.btn-sync{padding:3px 10px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.btn-sync:hover{border-color:var(--accent);color:var(--accent)}

/* ── 날짜 탭 ── */
.date-scroll{overflow-x:auto;scrollbar-width:none;padding:10px 12px 0;background:var(--surface);border-bottom:1px solid var(--border)}
.date-scroll::-webkit-scrollbar{display:none}
.date-tabs{display:flex;gap:5px;width:max-content;padding-bottom:10px}
.dtab{display:flex;flex-direction:column;align-items:center;padding:6px 10px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;min-width:50px}
.dtab:hover{border-color:var(--accent)}.dtab.active{border-color:var(--accent);background:rgba(99,102,241,.15)}
.dtab .tl{font-size:8px;color:var(--accent);font-weight:700}
.dtab .day{font-size:16px;font-weight:900;color:#fff;line-height:1.1}
.dtab .dow{font-size:9px;color:var(--muted);margin-top:1px}
.dtab .chip{font-size:8px;font-weight:700;margin-top:3px;padding:1px 5px;border-radius:6px;font-family:'JetBrains Mono',monospace}
.dtab.active .day{color:var(--accent)}
.chip-정상{background:rgba(34,197,94,.15);color:var(--green)}
.chip-주의{background:rgba(245,158,11,.15);color:var(--yellow)}
.chip-마감{background:rgba(239,68,68,.15);color:var(--red)}

/* ── 레이아웃 ── */
.body{padding:8px;height:calc(100vh - 170px);overflow:hidden}.layout{display:flex;gap:8px;flex-wrap:nowrap;align-items:stretch;height:100%}
.col-left{width:240px;min-width:240px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.col-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:0;height:100%;overflow:hidden}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:11px;display:flex;align-items:center;gap:5px}
.card-title::before{content:'';display:inline-block;width:3px;height:11px;background:var(--accent);border-radius:2px}
.date-bar{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:700;color:var(--accent);margin-bottom:11px;text-align:center}

/* ── 근무자 ── */
.site-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px}
.site-block:last-child{margin-bottom:0}
.site-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.site-lbl{font-size:11px;font-weight:700;padding:2px 9px;border-radius:8px}
.site-lbl.본소{background:rgba(96,165,250,.15);color:var(--본소)}
.site-lbl.북부{background:rgba(167,139,250,.15);color:var(--북부)}
.site-avail{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--green);font-weight:700}
.worker-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.worker-item{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 9px}
.wname{font-size:11px;font-weight:700;color:#fff;margin-bottom:4px}
.type-임기제{color:var(--blue)!important}.type-기간제{color:var(--accent)!important}
select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:11px;padding:4px 6px;outline:none;transition:border-color .2s}
select:focus{border-color:var(--accent)}
.avail-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 11px;display:flex;justify-content:space-between;align-items:center;margin-top:7px}
.avail-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--green)}
.avail-lbl{font-size:10px;color:var(--muted)}.avail-sub{font-size:9px;color:var(--muted);text-align:right}

/* ── 게이지 ── */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:18px;font-size:12px;font-weight:700;margin-bottom:9px;transition:all .3s}
.status-badge .dot{width:7px;height:7px;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.s-정상{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}.s-정상 .dot{background:var(--green)}
.s-주의{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid rgba(245,158,11,.3)}.s-주의 .dot{background:var(--yellow)}
.s-마감{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}.s-마감 .dot{background:var(--red)}
.gauge-track{height:24px;background:var(--surface);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.gauge-bar{height:100%;border-radius:12px;transition:width .6s cubic-bezier(.4,0,.2,1),background .4s;display:flex;align-items:center;justify-content:flex-end;padding-right:9px;min-width:0}
.gauge-bar span{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#fff}
.gauge-marks{display:flex;justify-content:space-between;font-size:9px;margin-top:3px;padding:0 2px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:9px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
.stat-box .val{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:#fff}
.stat-box .lbl{font-size:9px;color:var(--muted);margin-top:2px}

/* ── 3주 테이블 ── */
.mini-table{width:100%;border-collapse:collapse;font-size:10px}
.mini-table th{padding:4px;text-align:center;background:var(--surface);color:var(--muted);font-weight:700;border-bottom:1px solid var(--border)}
.mini-table td{padding:3px 4px;text-align:center;border-bottom:1px solid var(--border);color:var(--dim);cursor:pointer;transition:background .15s}
.mini-table tr:hover td{background:rgba(99,102,241,.07)}.mini-table tr.cur-row td{background:rgba(99,102,241,.12)}
.mini-table td.d-col{font-weight:700;color:#fff}.mini-table td.today-col{color:var(--accent);font-weight:900}

/* ══════════════════════════════════════
   오른쪽 패널 — 와이어프레임 구조
══════════════════════════════════════ */

/* ② 기종 검색 드롭다운 */
.search-wrap{position:relative;margin-bottom:10px}
.search-inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:9px 36px 9px 12px;outline:none;transition:border-color .2s;cursor:pointer}
.search-inp:focus{border-color:var(--accent)}
.search-arrow{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:11px}
.dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:10px;z-index:100;max-height:260px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.dropdown.open{display:block}
.dropdown::-webkit-scrollbar{width:3px}.dropdown::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.dd-item{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;cursor:pointer;transition:background .15s;font-size:12px}
.dd-item:hover{background:rgba(99,102,241,.1)}
.dd-item .dd-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dd-item .dd-mins{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;margin-left:8px}
.dd-filter{padding:8px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card)}
.dd-filter input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:5px 8px;outline:none}
.dd-filter input:focus{border-color:var(--accent)}

/* ③ 선택된 기종 입력 행 */
.input-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:none}
.input-row.visible{display:block}
.input-row-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.input-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.half-toggle{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;padding:5px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);transition:all .2s}
.half-toggle:hover{border-color:var(--yellow)}
.half-toggle.on{border-color:var(--yellow);background:rgba(245,158,11,.1)}
.half-toggle input{display:none}
.half-toggle-box{width:14px;height:14px;border:1px solid var(--border);border-radius:3px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:transparent;transition:all .2s;flex-shrink:0}
.half-toggle.on .half-toggle-box{background:var(--yellow);border-color:var(--yellow);color:#000}
.half-toggle-txt{font-size:11px;color:var(--muted);transition:color .2s;white-space:nowrap}
.half-toggle.on .half-toggle-txt{color:var(--yellow)}
.half-mins{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap}
.half-mins.on{color:var(--yellow)}
.cnt-ctrl{display:flex;align-items:center;gap:4px}
.btn-c{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.btn-c:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.cnt-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:#fff;width:28px;text-align:center}
.btn-add{padding:6px 16px;background:var(--accent);border:none;border-radius:7px;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;margin-left:auto}
.btn-add:hover{background:#5254d4}
.btn-add:active{transform:scale(.97)}

/* ④ 선택 기종 목록 */
.sel-list{display:flex;flex-direction:column;gap:5px;max-height:300px;overflow-y:auto;padding-right:2px}
.sel-list::-webkit-scrollbar{width:3px}.sel-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sel-item{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:7px;cursor:grab;flex-wrap:nowrap;border-left:3px solid transparent}
.sel-item.done{opacity:.55}
.sel-item.type-in{background:rgba(100,116,139,.15);border-left-color:#64748b}
.sel-item.type-1day{background:rgba(234,179,8,.08);border-left-color:#eab308}
.sel-item.type-out{background:rgba(34,197,94,.08);border-left-color:#22c55e}
.sel-item.dragging{opacity:.4;background:rgba(99,102,241,.15);cursor:grabbing}
.sel-item.drag-over{border-top:2px solid var(--accent)}
.sel-equip{font-size:12px;font-weight:600;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sel-person{font-size:11px;color:var(--dim);white-space:nowrap;flex-shrink:0}
.sel-days{font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0;min-width:22px}
.sel-chk{display:flex;align-items:center;gap:2px;cursor:pointer;flex-shrink:0}
.sel-chk input{display:none}
.sel-cb{font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid var(--border);color:var(--muted);background:var(--bg);transition:all .15s;white-space:nowrap}
.sel-chk.out-chk input:checked~.sel-cb{background:var(--blue);border-color:var(--blue);color:#fff}
.sel-chk.in-chk input:checked~.sel-cb{background:var(--green);border-color:var(--green);color:#fff}
.sel-mins{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0;min-width:30px;text-align:right}
.move-btn{width:20px;height:20px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;line-height:1}
.move-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.sel-item.full{border-left:3px solid var(--accent)}
.sel-item.half{border-left:3px solid var(--yellow)}
.sel-item-info{flex:1;min-width:0}
.sel-item-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sel-item-meta{font-size:10px;color:var(--muted);margin-top:1px}
.sel-item-meta .tag{display:inline-block;padding:0px 5px;border-radius:4px;font-size:9px;font-weight:700;margin-right:3px}
.tag-full{background:rgba(99,102,241,.15);color:var(--accent)}
.tag-half{background:rgba(245,158,11,.15);color:var(--yellow)}
.tag-site{background:rgba(100,116,139,.15);color:var(--muted)}
.sel-mins{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;flex-shrink:0}
.sel-item.full .sel-mins{color:var(--accent)}
.sel-item.half .sel-mins{color:var(--yellow)}
.btn-del{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.btn-del:hover{background:var(--red);border-color:var(--red);color:#fff}
.empty-msg{text-align:center;color:var(--muted);font-size:12px;padding:20px 0}
.btn-reset-all{width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-reset-all:hover{border-color:var(--red);color:var(--red)}

/* 로딩 */
.loading-overlay{position:fixed;inset:0;background:rgba(15,17,23,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:14px}
.loading-overlay.hidden{display:none}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--dim)}
@media(max-width:600px){.worker-grid{grid-template-columns:1fr 1fr}.stats-row{grid-template-columns:repeat(3,1fr)}.input-controls{gap:6px}}

/* ── 토큰 설정 모달 ── */
.token-modal{position:fixed;inset:0;background:rgba(15,17,23,.95);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.token-modal.hidden{display:none}
.token-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;max-width:420px}
.token-box h2{font-size:16px;font-weight:900;color:#fff;margin-bottom:6px}
.token-box p{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.token-box .steps{font-size:11px;color:var(--dim);margin-bottom:16px;padding:10px 12px;background:var(--surface);border-radius:8px;line-height:2}
.token-inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 12px;outline:none;margin-bottom:10px;transition:border-color .2s}
.token-inp:focus{border-color:var(--accent)}
.btn-token-save{width:100%;padding:11px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-token-save:hover{background:#5254d4}
.token-reset{font-size:10px;color:var(--muted);text-align:center;margin-top:8px;cursor:pointer;text-decoration:underline}
.token-reset:hover{color:var(--dim)}

/* ── 입력 필드 ── */
.input-fields{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.field-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.field-label{font-size:11px;color:var(--muted);min-width:60px;flex-shrink:0}
.person-inp{flex:1;min-width:120px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:6px 10px;outline:none;transition:border-color .2s}
.person-inp:focus{border-color:var(--accent)}

/* 기간 버튼 */
.days-ctrl{display:flex;gap:5px}
.day-btn{padding:5px 14px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.day-btn:hover{border-color:var(--accent);color:var(--accent)}
.day-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* 출고/입고 체크 */
.inout-ctrl{display:flex;gap:10px}
.chk-label{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;font-size:12px;color:var(--text)}
.chk-label input[type=checkbox]{display:none}
.chk-box{width:16px;height:16px;border:1px solid var(--border);border-radius:4px;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.chk-box::after{content:'✓';font-size:11px;font-weight:900;color:transparent;transition:color .15s}
.chk-label input:checked ~ .chk-box{background:var(--green);border-color:var(--green)}
.chk-label input:checked ~ .chk-box::after{color:#fff}
.chk-label input:checked ~ span{color:var(--green)}

/* 반타임 안내 */
.half-info{font-size:11px;color:var(--yellow);padding:5px 8px;background:rgba(245,158,11,.08);border-radius:6px;display:none}
.half-info.show{display:block}

/* 휴무일 뱃지 */
.dtab.holiday{border-color:var(--red)!important;background:rgba(239,68,68,.15)!important;box-shadow:0 0 8px rgba(239,68,68,.3)}
.dtab.holiday .day{color:var(--red)!important}
.dtab.holiday .dow{color:var(--red)!important}
.dtab.holiday .chip{opacity:.4}
.holiday-badge{font-size:8px;color:var(--red);font-weight:700;margin-top:1px}

/* sel-item 업데이트 */
.sel-item-days{font-size:10px;color:var(--muted)}
.sel-item-person{font-size:11px;color:var(--dim);font-weight:500}
.inout-badges{display:flex;gap:3px;margin-top:2px}
.badge-out{font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(96,165,250,.15);color:var(--blue);font-weight:700}
.badge-in {font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(52,211,153,.15);color:var(--green);font-weight:700}
.badge-out.done{background:rgba(96,165,250,.4);color:#fff}
.badge-in.done {background:rgba(52,211,153,.4);color:#fff}
.badge-pending{opacity:.5}

/* 입출고 팝업 */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.popup-overlay.hidden{display:none}
.popup-box{background:var(--card);border:1px solid var(--border);border-radius:14px;width:100%;max-width:900px;max-height:85vh;display:flex;flex-direction:column}
.popup-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.popup-header h2{font-size:14px;font-weight:700;color:#fff}
.popup-body{overflow-y:auto;padding:14px;flex:1}
.popup-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.popup-col{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.popup-col-hdr{padding:8px 12px;font-size:11px;font-weight:700;background:var(--bg);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.popup-col-hdr.today{color:var(--accent);background:rgba(99,102,241,.08)}
.popup-col-hdr .cnt{font-family:'JetBrains Mono',monospace;font-size:10px}
.popup-entry{padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px}
.popup-entry:last-child{border-bottom:none}
.popup-entry-name{font-weight:700;color:var(--text);margin-bottom:2px}
.popup-entry-person{color:var(--dim);font-size:10px;margin-bottom:4px}
.popup-entry-days{font-size:10px;color:var(--muted);margin-bottom:4px}
.popup-chks{display:flex;gap:6px}
.popup-chk{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);transition:all .2s}
.popup-chk:hover{border-color:var(--accent)}
.popup-chk input{display:none}
.popup-chk .cb{width:13px;height:13px;border:1px solid var(--border);border-radius:3px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all .15s}
.popup-chk input:checked ~ .cb{background:var(--green);border-color:var(--green);color:#fff}
.popup-chk.out-chk input:checked ~ .cb{background:var(--blue);border-color:var(--blue)}
.popup-chk.out-chk input:checked ~ span{color:var(--blue)}
.popup-chk.in-chk input:checked ~ .cb{background:var(--green);border-color:var(--green)}
.popup-chk.in-chk input:checked ~ span{color:var(--green)}
.btn-print{padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.btn-print:hover{border-color:var(--blue);color:var(--blue)}
.btn-close-popup{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-close-popup:hover{background:var(--red);border-color:var(--red);color:#fff}
@media print{
  body > *:not(.popup-overlay){display:none!important}
  .popup-overlay{position:static!important;background:white!important;padding:0!important;display:block!important}
  .popup-box{max-height:none!important;border:none!important;box-shadow:none!important;background:white!important}
  .popup-header{border-bottom:2px solid #333!important}
  .popup-header h2{color:#000!important;font-size:16px!important}
  .popup-header .btn-print,.popup-header .btn-close-popup{display:none!important}
  #popupCols table{border-collapse:collapse!important}
  #popupCols td,#popupCols th{border:1px solid #999!important;color:#000!important;background:white!important;font-size:11px!important}
  #popupCols input[type=checkbox]{display:inline!important}
}
@media(max-width:600px){.popup-cols{grid-template-columns:1fr}}

/* ── 배송 체크박스 ── */
.delivery-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .2s;user-select:none}
.delivery-bar:hover{border-color:var(--yellow)}
.delivery-bar.on{border-color:var(--yellow);background:rgba(245,158,11,.08)}
.delivery-bar input[type=checkbox]{display:none}
.delivery-chk-box{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:transparent;transition:all .2s;flex-shrink:0}
.delivery-bar.on .delivery-chk-box{background:var(--yellow);border-color:var(--yellow);color:#000}
.delivery-label{font-size:13px;font-weight:700;color:var(--dim);flex:1;transition:color .2s}
.delivery-bar.on .delivery-label{color:var(--yellow)}
.delivery-mins{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);transition:color .2s}
.delivery-bar.on .delivery-mins{color:var(--yellow)}

/* 배송 체크박스 */
.delivery-toggle{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;padding:5px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);transition:all .2s;margin-left:6px}
.delivery-toggle:hover{border-color:var(--yellow)}
.delivery-toggle.on{border-color:var(--yellow);background:rgba(245,158,11,.1)}
.delivery-toggle input{display:none}
.delivery-chk-sq{width:15px;height:15px;border:2px solid var(--border);border-radius:3px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;position:relative}
.delivery-chk-sq::after{content:'✓';font-size:10px;font-weight:900;color:transparent;transition:color .15s}
.delivery-toggle.on .delivery-chk-sq{background:var(--yellow);border-color:var(--yellow)}
.delivery-toggle.on .delivery-chk-sq::after{color:#000}
.delivery-box{font-size:13px}
.delivery-txt{font-size:11px;color:var(--muted);transition:color .2s;white-space:nowrap}
.delivery-toggle.on .delivery-txt{color:var(--yellow);font-weight:700}

.btn-edit{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.btn-edit:hover{background:var(--accent);border-color:var(--accent);color:#fff}

.dtab-plus{position:absolute;top:2px;right:2px;width:14px;height:14px;border-radius:3px;background:rgba(99,102,241,.3);color:var(--accent);font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;line-height:1}
.dtab-plus:hover{background:var(--accent);color:#fff}

/* 3일 임대 목록 */
.tri-col{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;min-height:60px}
.tri-col-hdr{padding:6px 10px;font-size:11px;font-weight:700;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.tri-col-hdr.tri-today{background:rgba(99,102,241,.1);color:var(--accent)}
.tri-col-hdr.tri-other{color:var(--muted)}
.tri-col-hdr.tri-holiday{color:var(--red)}
.tri-entry{padding:5px 8px;border-bottom:1px solid var(--border);font-size:10px}
.tri-entry:last-child{border-bottom:none}
.tri-entry-name{color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.tri-entry-person{color:var(--muted);font-size:9px}
.tri-chks{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.tri-chk{display:inline-flex;align-items:center;gap:2px;cursor:pointer;font-size:10px}
.tri-chk input{cursor:pointer;width:12px;height:12px}
.tri-empty{padding:10px;text-align:center;color:var(--muted);font-size:10px}
@media(max-width:600px){#triDayCols{grid-template-columns:1fr}}

.tri-day-col{background:var(--card);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;min-height:200px}
.tri-day-hdr{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.tri-day-hdr.is-today{background:rgba(99,102,241,.12)}
.tri-day-hdr.is-holiday{background:rgba(239,68,68,.08)}
.tri-day-title{font-size:12px;font-weight:700}
.tri-day-cnt{font-size:10px;color:var(--muted)}
.tri-day-addbtn{padding:2px 8px;background:rgba(99,102,241,.2);border:1px solid rgba(99,102,241,.4);border-radius:6px;color:var(--accent);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:"Noto Sans KR",sans-serif}
.tri-day-addbtn:hover{background:var(--accent);color:#fff}
/* 날짜별 입력창 */
.tri-input-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:10px;display:none;flex-shrink:0}
.tri-input-panel.open{display:block}
.tri-input-row{display:flex;flex-direction:column;gap:6px}
.tri-search-wrap{position:relative}
.tri-search-inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:"Noto Sans KR",sans-serif;font-size:12px;padding:7px 28px 7px 10px;outline:none;cursor:pointer;transition:border-color .2s}
.tri-search-inp:focus{border-color:var(--accent)}
.tri-dropdown{position:absolute;top:calc(100%+3px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:8px;z-index:200;max-height:180px;overflow-y:auto;display:none;box-shadow:0 8px 20px rgba(0,0,0,.4)}
.tri-dropdown.open{display:block}
.tri-dd-filter{padding:6px 8px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card)}
.tri-dd-filter input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:11px;padding:4px 7px;outline:none;font-family:"Noto Sans KR",sans-serif}
.tri-person-inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:"Noto Sans KR",sans-serif;font-size:12px;padding:7px 10px;outline:none;transition:border-color .2s}
.tri-person-inp:focus{border-color:var(--accent)}
.tri-days-row{display:flex;align-items:center;gap:5px}
.tri-add-btn{width:100%;padding:7px;background:var(--accent);border:none;border-radius:7px;color:#fff;font-family:"Noto Sans KR",sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-top:4px}
.tri-add-btn:hover{background:#5254d4}
/* 목록 */
.tri-list{flex:1;overflow-y:auto;padding:4px 0}
.tri-list::-webkit-scrollbar{width:3px}.tri-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.tri-item{display:flex;align-items:center;gap:4px;padding:5px 8px;border-bottom:1px solid var(--border);font-size:11px}
.tri-item:last-child{border-bottom:none}
.tri-item.ti-in{border-left:3px solid var(--muted);background:rgba(100,116,139,.06)}
.tri-item.ti-1day{border-left:3px solid #eab308;background:rgba(234,179,8,.06)}
.tri-item.ti-out{border-left:3px solid var(--green);background:rgba(34,197,94,.06)}
.tri-item-person{font-weight:700;color:#fff;white-space:nowrap;min-width:40px;flex-shrink:0}
.tri-item-chks{display:flex;gap:3px;flex-shrink:0}
.tri-item-chk{display:inline-flex;align-items:center;gap:2px;cursor:pointer;font-size:10px}
.tri-item-chk input{width:11px;height:11px;cursor:pointer}
.tri-item-days{font-size:9px;color:var(--muted);flex-shrink:0}
.tri-item-equip{flex:1;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.tri-item-mins{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--muted);flex-shrink:0}
.tri-item-btns{display:flex;gap:2px;flex-shrink:0}
.tri-reset{width:100%;padding:5px;background:transparent;border:none;color:var(--muted);font-size:10px;cursor:pointer;text-align:center;font-family:"Noto Sans KR",sans-serif;border-top:1px solid var(--border)}
.tri-reset:hover{color:var(--red)}
.tri-empty{padding:16px;text-align:center;color:var(--muted);font-size:11px}
.gauge-wrap{position:relative;height:22px;background:var(--surface);border-radius:12px;overflow:hidden;margin:8px 0}

.dtab.rainy{border-color:rgba(96,165,250,.5);background:rgba(96,165,250,.06)}
.dtab.rainy .day{color:#60a5fa}
</style>
</head>
<body>

<!-- 취소 사유 모달 -->
<div class="token-modal hidden" id="cancelModal">
  <div class="token-box" style="max-width:320px">
    <h2 style="font-size:15px;font-weight:900;color:#fff;margin-bottom:4px">취소 사유</h2>
    <p id="cancelEquipName" style="font-size:12px;color:var(--muted);margin-bottom:16px"></p>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button onclick="confirmCancel('우천')" style="padding:10px;background:rgba(96,165,250,.15);border:1px solid rgba(96,165,250,.3);border-radius:8px;color:var(--blue);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer">🌧️ 우천</button>
      <button onclick="confirmCancel('개인사정')" style="padding:10px;background:rgba(100,116,139,.15);border:1px solid rgba(100,116,139,.3);border-radius:8px;color:var(--dim);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer">👤 개인사정</button>
      <button onclick="confirmCancel('기타')" style="padding:10px;background:rgba(100,116,139,.15);border:1px solid rgba(100,116,139,.3);border-radius:8px;color:var(--dim);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer">📝 기타</button>
    </div>
    <button onclick="closeCancelModal()" style="width:100%;margin-top:12px;padding:8px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer">취소 안 함</button>
  </div>
</div>

<!-- 임대 내역 수정 모달 -->
<div class="token-modal hidden" id="editModal">
  <div class="token-box" style="max-width:520px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:15px;font-weight:900;color:#fff">✏️ 임대 내역 수정</h2>
      <button onclick="closeEditModal()" style="width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:16px;cursor:pointer">✕</button>
    </div>
    <!-- 장비명 검색 -->
    <div style="margin-bottom:10px">
      <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:5px">장비명</label>
      <div class="search-wrap" id="editSearchWrap">
        <input type="text" class="search-inp" id="editSearchInp" placeholder="검색…" readonly onclick="openEditDD()" autocomplete="off" style="margin-bottom:0">
        <span class="search-arrow">▼</span>
        <div class="dropdown" id="editDropdown">
          <div class="dd-filter"><input type="text" id="editDdFilter" placeholder="검색…" oninput="filterEditDD()" onclick="event.stopPropagation()"></div>
          <div id="editDdList"></div>
        </div>
      </div>
    </div>
    <!-- 성명 -->
    <div style="margin-bottom:10px">
      <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:5px">성명</label>
      <input type="text" id="editPersonInp" class="person-inp" placeholder="성명 입력" style="width:100%">
    </div>
    <!-- 시작일 -->
    <div style="margin-bottom:10px">
      <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:5px">임대 시작일</label>
      <div style="position:relative;cursor:pointer;display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;" onclick="document.getElementById('editStartDatePicker').showPicker()">
        <span id="editStartDateTxt" style="flex:1;color:var(--text);font-size:13px">날짜 선택</span>
        <span style="color:var(--muted);font-size:14px">📅</span>
        <input type="date" id="editStartDate" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none"
          oninput="document.getElementById('editStartDateTxt').textContent=formatLocalDate(this.value)">
        <input type="date" id="editStartDatePicker" style="position:absolute;opacity:0;width:100%;height:100%;top:0;left:0;cursor:pointer"
          oninput="document.getElementById('editStartDate').value=this.value;document.getElementById('editStartDateTxt').textContent=formatLocalDate(this.value)">
      </div>
    </div>
    <!-- 임대기간 -->
    <div style="margin-bottom:10px">
      <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:5px">임대기간</label>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:nowrap">
        <div class="days-ctrl">
          <button class="day-btn" onclick="setEditDays(1)" id="editDayBtn1">1일</button>
          <button class="day-btn" onclick="setEditDays(2)" id="editDayBtn2">2일</button>
          <button class="day-btn" onclick="setEditDays(3)" id="editDayBtn3">3일</button>
          <button class="day-btn" onclick="openEditDatePicker()" id="editDayBtnX">📅 직접</button>
          <input type="date" id="editReturnDatePicker" style="display:none" onchange="setEditDaysByDate(this.value)">
        </div>
        <div class="delivery-toggle" id="editDeliveryToggle" onclick="toggleEditDelivery()">
          <span class="delivery-chk-sq" id="editDeliveryChkSq"></span>
          <span class="delivery-box">🚚</span>
          <span class="delivery-txt">배송</span>
        </div>
      </div>
    </div>
    <!-- 소요시간 안내 -->
    <div class="half-info show" id="editHalfInfo" style="margin-bottom:14px">–</div>
    <!-- 저장 버튼 -->
    <button onclick="saveEdit()" style="width:100%;padding:11px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer">저장</button>
  </div>
</div>

<!-- 입출고 목록 팝업 -->
<div class="popup-overlay hidden" id="inoutPopup">
  <div class="popup-box">
    <div class="popup-header">
      <h2>📋 입출고 작업 목록</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="popupDateLabel" style="font-size:12px;color:var(--muted)"></span>
        <button class="btn-print" onclick="window.print()">🖨️ 인쇄</button>
        <button class="btn-close-popup" onclick="closePopup()">✕</button>
      </div>
    </div>
    <div class="popup-body">
      <div id="popupCols" style="overflow-x:auto"></div>
    </div>
  </div>
</div>

<!-- 비밀번호 로그인 모달 -->
<div class="token-modal hidden" id="tokenModal">
  <div class="token-box">
    <h2>🚜 농기계 임대 현황</h2>
    <p>파주시 농업기계임대사업소</p>
    <input type="password" class="token-inp" id="tokenInp" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')saveToken()">
    <button class="btn-token-save" onclick="saveToken()">접속</button>
    <div id="loginError" style="color:var(--red);font-size:12px;text-align:center;margin-top:8px;display:none">비밀번호가 틀렸습니다</div>
  </div>
</div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-txt">데이터 불러오는 중…</div>
</div>

<header>
  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:10px">
      <h1>🚜 농기계 <span>임대 현황</span></h1>
      <div class="site-tabs" style="margin-top:0">
        <button class="stab a-전체" onclick="setSite('전체')">전체</button>
        <button class="stab" onclick="setSite('본소')">본소</button>
        <button class="stab" onclick="setSite('북부')">북부</button>
      </div>

}

// ─── GitHub ───
function setSyncUI(mode,msg){document.getElementById('sdot').className='sdot '+mode;document.getElementById('stxt').textContent=msg;}

async function loadData(){
  if(!checkToken()) return;
  setSyncUI('saving','불러오는 중…');
  // 토큰 모달이 열려있으면 로딩 오버레이 표시 안 함
  const tokenModalOpen = !document.getElementById('tokenModal').classList.contains('hidden');
  if(!tokenModalOpen) document.getElementById('loadingOverlay').classList.remove('hidden');
  try{
    const res = await fetch(GH_API+'?t='+Date.now(), {
      headers: {
        Authorization: 'token '+GH_TOKEN,
        Accept: 'application/vnd.github.v3+json'
      }
    });
    if(res.status === 404){
      initState();
      ghSha = null;
      setSyncUI('ok','첫 실행 — 입력 후 자동 저장됩니다');
    } else if(res.ok){
      const json = await res.json();
      ghSha = json.sha;
      // base64 디코딩
      const jsonStr = decodeURIComponent(escape(atob(json.content.replace(/\n/g,''))));
      const raw = JSON.parse(jsonStr);
      // 새 포맷(state+holidays) vs 구 포맷 호환
      let decoded, savedHolidays = [];
      if(raw && raw.state && typeof raw.state === 'object') {
        decoded = raw.state;
        savedHolidays = raw.holidays || [];
      } else if(raw && typeof raw === 'object') {
        decoded = raw;
      } else {
        decoded = {};
      }

      // 휴무일 복원
      if(savedHolidays.length > 0) saveHolidays(savedHolidays);
      // 우천 복원
      if(raw.rainy && raw.rainy.length > 0) saveRainy(raw.rainy);
      // 취소 이력 복원
      if(raw.cancelled && Array.isArray(raw.cancelled)) state._cancelled = raw.cancelled;

      // 빈 상태로 초기화 후 복원
      initState();
      Object.keys(decoded).forEach(dk => {
        ensureDay(dk);
        ['본소','북부'].forEach(st => {
          if(!decoded[dk] || !decoded[dk][st]) return;
          const src = decoded[dk][st];
          // workers 복원
          if(src.workers){
            Object.keys(src.workers).forEach(wid => {
              state[dk][st].workers[wid] = src.workers[wid];
            });
          }
          // entries 복원
          if(Array.isArray(src.entries)){
            state[dk][st].entries = src.entries;
          }
          // delivery 복원
          if(src.delivery !== undefined){
            state[dk][st].delivery = src.delivery;
          }
        });
      });
      setSyncUI('ok','동기화 완료 · '+new Date().toLocaleTimeString('ko-KR'));
    } else {
      throw new Error('HTTP '+res.status);
    }
  } catch(e){
    setSyncUI('err','불러오기 실패: '+e.message);
  } finally {
    document.getElementById('loadingOverlay').classList.add('hidden');
    renderAll();
    // 레이아웃 완성 후 3일 컬럼 재렌더 (높이 계산)
    setTimeout(() => renderTriDayPanel(), 300);
  }
}

async function saveData(){
  // 토큰 없으면 저장 안 함 (로그인 전 데이터 덮어쓰기 방지)
  if(!GH_TOKEN) { setSyncUI('idle','로그인 필요'); return; }
  setSyncUI('saving','저장 중…');
  // 범위 제한 없이 전체 state 저장 + 휴무일 포함
  const trimmed = JSON.parse(JSON.stringify(state));
  const savePayload = {
    state: trimmed,
    holidays: getHolidays(),
    rainy: getRainy(),
    cancelled: state._cancelled || []
  };
  const jsonStr = JSON.stringify(savePayload, null, 2);
  const content = btoa(unescape(encodeURIComponent(jsonStr)));
  const body = {
    message: 'update '+new Date().toISOString(),
    content: content,
    ...(ghSha ? {sha: ghSha} : {})
  };
  try{
    const res = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        Authorization: 'token '+GH_TOKEN,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    ghSha = json.content.sha;
    setSyncUI('ok','저장 완료 · '+new Date().toLocaleTimeString('ko-KR'));
  } catch(e){
    setSyncUI('err','저장 실패: '+e.message);
    // SHA 충돌(409)이면 최신 SHA 받아서 재시도
    if(e.message.includes('409')) {
      try {
        const r2 = await fetch(GH_API+'?t='+Date.now(), {
          headers: { Authorization: 'token '+GH_TOKEN, Accept: 'application/vnd.github.v3+json' }
        });
        const j2 = await r2.json();
        ghSha = j2.sha;
        // 재시도
        body.sha = ghSha;
        const r3 = await fetch(GH_API, {
          method: 'PUT',
          headers: { Authorization: 'token '+GH_TOKEN, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if(r3.ok) {
          const j3 = await r3.json();
          ghSha = j3.content.sha;
          setSyncUI('ok','저장 완료(재시도) · '+new Date().toLocaleTimeString('ko-KR'));
        }
      } catch(e2) {
        setSyncUI('err','저장 실패(재시도): '+e2.message);
      }
    } else {
      // 저장 실패 시 3초 후 재시도
      setTimeout(() => saveData(), 3000);
    }
  }
}

  });
  // 우천일 시트

  const a = document.createElement('a');
    a.href = url; a.download = f.name;

    URL.revokeObjectURL(url);
  });

  // 취소 이력 CSV
  

  setSyncUI('ok', '📊 CSV 6개 다운로드 완료!');
}


function scheduleSave(){
  if(!GH_TOKEN) return;if(saveTimer)clearTimeout(saveTimer);setSyncUI('saving','변경됨…');saveTimer=setTimeout(saveData,1000);}

// ─── 계산 ───
function getAvailSite(dk,st){return Object.values(state[dk][st].workers).reduce((a,b)=>a+b,0);}
function getAvail(dk,st){if(st==='전체')return SITES.reduce((s,x)=>s+getAvailSite(dk,x),0);return getAvailSite(dk,st);}
function getUsed(dk,st){if(st==='전체')return SITES.reduce((s,x)=>s+getUsedSite(dk,x),0);return getUsedSite(dk,st);}
function getPct(dk,st){const a=getAvail(dk,st);return a?Math.round(getUsed(dk,st)/a*100):0;}
function getStatus(p){return p>=100?'마감':p>=80?'주의':'정상';}

function setDaysByDate(returnDate) {
  if(!returnDate) return;
  const dk = getDkeys()[curIdx];
  const start = new Date(dk);
  const end = new Date(returnDate);
  const diff = Math.round((end - start) / 86400000);
  if(diff < 1) return;
  selDays = diff;
  // 모든 버튼 비활성화 후 직접 버튼 활성화
  [1,2,3].forEach(n => document.getElementById('dayBtn'+n).classList.remove('active'));
  const btnX = document.getElementById('dayBtnX');
  btnX.classList.add('active');
  btnX.textContent = diff + '일';
  document.getElementById('returnDatePicker').style.display = 'none';
  updateHalfInfo();
}

function shiftDates(delta) {
  dateOffset += delta;
  // 오늘이 항상 보이도록 제한 (너무 많이 이동 방지)
  // 최소: 30일 전, 최대: 30일 후
  dateOffset = Math.max(-30, Math.min(30, dateOffset));
  // curIdx 재조정: 오늘이 범위 내에 있으면 오늘로, 아니면 0
  const dkeys = getDkeys();
  const todayDk = today().toISOString().slice(0,10);
  const todayIdx = dkeys.indexOf(todayDk);
  curIdx = todayIdx >= 0 ? todayIdx : 0;
  renderAll();
}

function resetDates() {
  dateOffset = 0;
  curIdx = 0;
  renderAll();
}

// ═══ 장비 임대 상태 계산 ═══
function getEquipStatus(equipName, siteName) {
  const dk = getDkeys()[curIdx]; // 현재 선택 날짜
  const targetSites = siteName ? [siteName] : (curSite==='전체' ? ['본소','북부'] : [curSite]);

  for(const st of targetSites) {
    const entries = [];
    Object.keys(state).forEach(startDk => {
      if(!state[startDk]||!state[startDk][st]) return;
      state[startDk][st].entries.forEach(e => {
        if(e.equipName === equipName) entries.push({e, startDk});
      });
    });

    for(const {e} of entries) {
      // 입고일 계산 (원래 스케줄 기준)
      const inDate = new Date(e.startDate);
      inDate.setDate(inDate.getDate() + e.days - 1);
      const inDk = inDate.toISOString().slice(0,10);

      // 정비중: 오늘이 입고일 (실제 입고 여부와 무관)
      if(inDk === dk) return '정비중';

      // 임대중: 출고됐고 입고일이 오늘 이후
      if(e.outDone && inDk > dk) return '임대중';

      // 출고 예정(오늘): 아직 임대 가능 아님
      if(e.startDate === dk && !e.outDone) return '출고예정';
    }
  }
  return null; // 이상 없음
}


function renderInoutCols() {
  const DATES = getDates();
  const DKEYS = getDkeys();
  const idx   = curIdx;
  const holidays = getHolidays();
  const DOW2  = ['일','월','화','수','목','금','토'];
  const targetSites = curSite==='전체' ? ['본소','북부'] : [curSite];

  [-1, 0, 1].forEach((offset, ci) => {
    const i = idx + offset;
    const col = document.getElementById('inoutCol'+ci);
    if(!col) return;

    // 날짜 계산 (탭 범위 밖이어도 실제 날짜 사용)
    const d = new Date(DATES[idx]);
    d.setDate(d.getDate() + offset);
    const dk = d.toISOString().slice(0,10);

    const isToday2 = dk === today().toISOString().slice(0,10);
    const isHol = holidays.includes(dk);
    const dateStr = (d.getMonth()+1)+'/'+d.getDate()+'('+DOW2[d.getDay()]+')';
    const hdrColor = isToday2 ? 'var(--accent)' : (isHol ? 'var(--red)' : 'var(--muted)');

    // 이 날짜 미완결 작업 수집
    const tasks = [];
    Object.keys(state).forEach(startDk => {
      targetSites.forEach(site => {
        if(!state[startDk]||!state[startDk][site]) return;
        state[startDk][site].entries.forEach(e => {
          const inDate = new Date(e.startDate);
          inDate.setDate(inDate.getDate() + e.days - 1);
          const inDk  = inDate.toISOString().slice(0,10);
          const outDk = e.startDate;

          const needOut = outDk === dk && !e.outDone;
          const needIn  = inDk  === dk && !e.inDone;
          const needInPastOut = inDk === dk && e.outDone && !e.inDone;

          if(!needOut && !needIn && !needInPastOut) return;

          // 타입
          let type = 'type-out';
          if(needIn || needInPastOut) type = (e.days===1 && needOut) ? 'type-1day' : 'type-in';

          tasks.push({e, site, startDk, outDk, inDk, needOut, needIn: needIn||needInPastOut, type});
        });
      });
    });

    // 정렬
    const order = {'type-in':0,'type-1day':1,'type-out':2};
    tasks.sort((a,b) => {
      if(order[a.type]!==order[b.type]) return order[a.type]-order[b.type];
      if(a.type==='type-in' && a.e.days!==b.e.days) return b.e.days-a.e.days;
      if(a.type==='type-out' && a.e.days!==b.e.days) return a.e.days-b.e.days;
      return (a.e.personName||'').localeCompare(b.e.personName||'','ko');
    });

    const outCnt = tasks.filter(t=>t.needOut).length;
    const inCnt  = tasks.filter(t=>t.needIn).length;

    let rowsHtml = tasks.map(t => {
      const e = t.entry || t.e;
      const bgMap = {'type-in':'rgba(100,116,139,.1)','type-1day':'rgba(234,179,8,.07)','type-out':'rgba(34,197,94,.07)'};
      const borderMap = {'type-in':'#64748b','type-1day':'#eab308','type-out':'#22c55e'};

function renderSelList(){
  const el = document.getElementById('selList');
  if(!el) return; // selList 없는 레이아웃에서는 스킵
  const dk = getDkeys()[curIdx];
  const showSites = curSite==='전체' ? SITES : [curSite];
  const holidays = getHolidays();

  // 전체 entries 수집 + 타입 분류
  const items = [];
  showSites.forEach(st => {
    Object.keys(state).forEach(startDk => {
      if(!state[startDk]||!state[startDk][st]) return;
      state[startDk][st].entries.forEach((e, idx2) => {
        const start   = new Date(e.startDate);
        const target  = new Date(dk);
        const diff    = Math.round((target - start) / 86400000);
        const lastDay = e.days - 1;

        const canOut = diff === 0;
        const canIn  = (e.days===1 && diff===0) || (e.days>1 && diff===lastDay);
        if(!canOut && !canIn) return;

        // 타입 분류
        let type;
        if(e.days===1 && canOut && canIn) type = 'type-1day';  // 1일 임대 (노란)
        else if(canIn && !canOut)          type = 'type-in';    // 입고 (회색)
        else                               type = 'type-out';   // 출고 (초록)

        items.push({e, st, startDk, idx: idx2, canOut, canIn, type});
      });
    });
  });

  // 정렬
  items.sort((a, b) => {
    // 그룹 순서: 입고(0) → 1일(1) → 출고(2)
    const order = {'type-in':0,'type-1day':1,'type-out':2};
    if(order[a.type] !== order[b.type]) return order[a.type] - order[b.type];

    // 입고: 기간 긴 순
    if(a.type==='type-in') {
      if(a.e.days !== b.e.days) return b.e.days - a.e.days;
    }
    // 출고: 기간 짧은 순
    if(a.type==='type-out') {
      if(a.e.days !== b.e.days) return a.e.days - b.e.days;
    }
    // 성명 가나다
    return (a.e.personName||'').localeCompare(b.e.personName||'', 'ko');
  });

  // 렌더링
  let h = '';
  items.forEach(({e, st, startDk, idx: idx2, canOut, canIn, type}) => {
    const entries = state[startDk][st].entries;
    const isFirst = idx2===0, isLast = idx2===entries.length-1;
    const totalMins = calcMinsForDate(e, dk);
    const daysLabel = e.days+'일';

    h += `<div class="sel-item ${type} ${e.outDone&&e.inDone?'done':''}"
      draggable="true" data-site="${st}" data-startdk="${startDk}" data-idx="${idx2}"
      ondragstart="dragStart(event)" ondragover="dragOver(event)"
      ondrop="dragDrop(event)" ondragend="dragEnd(event)">
      <div style="display:flex;flex-direction:column;gap:1px;flex-shrink:0">
        <button class="move-btn" onclick="moveEntry('${st}',${idx2},-1,'${startDk}')"
          ${isFirst?'disabled style="opacity:.25;pointer-events:none"':''}>&#9650;</button>
        <button class="move-btn" onclick="moveEntry('${st}',${idx2},+1,'${startDk}')"
          ${isLast?'disabled style="opacity:.25;pointer-events:none"':''}>&#9660;</button>
      </div>
      <span class="sel-person" style="min-width:52px;flex-shrink:0;font-weight:700;color:#fff">👤 ${e.personName}</span>
      ${canOut ? `<label class="sel-chk out-chk">
        <input type="checkbox" ${e.outDone?'checked':''} onchange="toggleEntryCheckInline('${startDk}','${st}',${idx2},'out',this.checked)">
        <span class="sel-cb">출고</span>
      </label>` : `<span style="min-width:38px"></span>`}
      ${canIn ? `<label class="sel-chk in-chk">
        <input type="checkbox" ${e.inDone?'checked':''} onchange="toggleEntryCheckInline('${startDk}','${st}',${idx2},'in',this.checked)">
        <span class="sel-cb">입고</span>
      </label>` : `<span style="min-width:38px"></span>`}
      <span class="sel-days" style="flex-shrink:0">${daysLabel}</span>
      <span class="sel-equip" style="flex:1">${e.equipName}${e.delivery?' 🚚':''}</span>
      ${curSite==='전체'?`<span style="font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(100,116,139,.2);color:var(--muted);flex-shrink:0">${st}</span>`:''}
      <span class="sel-mins">${totalMins}분</span>
      <button class="btn-edit" onclick="openEditModal('${startDk}','${st}',${idx2})" title="수정">✏️</button>
      <button class="btn-del" onclick="delEntry('${st}',${idx2},'${startDk}')" title="삭제">&#10005;</button>
    </div>`;
  });

  el.innerHTML = h || '<div class="empty-msg">장비를 선택 후 입력하세요</div>';
}


function toggleEntryCheckInline(startDk, site, idx, type, val) {
  if(!state[startDk] || !state[startDk][site]) return;
  const entry = state[startDk][site].entries[idx];
  if(!entry) return;
  if(type === 'out') entry.outDone = val;
  else entry.inDone = val;
  if(saveTimer) clearTimeout(saveTimer);
  saveData();
  renderSelList();
  renderGauge();
  renderDateTabs();
  
}


// ── 상하 이동 ──
function moveEntry(site, idx, dir, startDk) {
  const dk2 = startDk || getDkeys()[curIdx];
  if(!state[dk2] || !state[dk2][site]) return;
  const entries = state[dk2][site].entries;
  const ni = idx + dir;
  if(ni < 0 || ni >= entries.length) return;
  [entries[idx], entries[ni]] = [entries[ni], entries[idx]];
  if(saveTimer) clearTimeout(saveTimer);
  saveData();
  renderSelList();
}

let _dSite=null,_dIdx=null;
function dragStart(e){
  _dSite=e.currentTarget.dataset.site;
  _dIdx=parseInt(e.currentTarget.dataset.idx);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function dragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.sel-item').forEach(el=>el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function dragDrop(e){
  e.preventDefault();
  const tSite=e.currentTarget.dataset.site;
  const tIdx=parseInt(e.currentTarget.dataset.idx);
  if(_dSite===null||_dIdx===tIdx) return;
  const dk=getDkeys()[curIdx];
  const entries=state[dk][_dSite].entries;
  const moved=entries.splice(_dIdx,1)[0];
  entries.splice(tIdx,0,moved);
  if(saveTimer) clearTimeout(saveTimer);
  saveData();
  renderSelList();
}
function dragEnd(e){
  document.querySelectorAll('.sel-item').forEach(el=>{
    el.classList.remove('dragging');
    el.classList.remove('drag-over');
  });
  _dSite=null; _dIdx=null;
}

function filterDD() {
  const q = (document.getElementById('ddFilter').value || '').toLowerCase().trim();
  const site = curSite === '전체' ? null : curSite;
  let list = [];
  if (!site) {
    ['본소','북부'].forEach(st => EQUIP_LIST[st].forEach(e => list.push({...e, site:st})));
  } else {
    EQUIP_LIST[site].forEach(e => list.push({...e, site}));
  }

  // 공백/하이픈으로 단어 분리해서 모두 포함된 것만
  const terms = q ? q.split(/[\s\-]+/).filter(Boolean) : [];
  const filtered = terms.length === 0 ? list : list.filter(e => {
    const target = (e.n + ' ' + e.s).toLowerCase();
    return terms.every(t => target.includes(t));
  });

  document.getElementById('ddList').innerHTML = filtered.map(e => {
    const status = getEquipStatus(e.n, e.site);
    const statusBadge = status === '정비중'
      ? '<span style="margin-left:6px;font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(245,158,11,.2);color:var(--yellow);font-weight:700">🔧 정비중</span>'

      : status === '출고예정'
      ? '<span style="margin-left:6px;font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(96,165,250,.2);color:var(--blue);font-weight:700">📦 출고예정</span>'
      : '';
    return `<div class="dd-item" onclick='selectEquip(${JSON.stringify(e)})'>
      <span class="dd-name">${e.n} ${statusBadge}</span>
      <span class="dd-mins" style="font-size:10px;color:var(--muted)">${e.s}</span>
    </div>`;

// ── 정비시간 계산 재정의 ──
function getUsedSite(dk, site) {
  // 부하율: calcMinsForLoad (effective 날짜 기준, 휴무일 반영)
  let total = 0;
  Object.keys(state).forEach(startDk => {
    if(!state[startDk] || !state[startDk][site]) return;
    state[startDk][site].entries.forEach(e => {
      total += calcMinsForLoad(e, dk);
    });
    // 배송 소요시간
    if(state[startDk][site].delivery) {
      const holidays = getHolidays();
      const isHol = holidays.includes(startDk);
      if(isHol) {
        // 휴무일 배송: 전날 120분 + 다음날 120분
        let prevDay = new Date(startDk);
        prevDay.setDate(prevDay.getDate() - 1);
        while(holidays.includes(prevDay.toISOString().slice(0,10)))
          prevDay.setDate(prevDay.getDate() - 1);
        let nextDay = new Date(startDk);
        nextDay.setDate(nextDay.getDate() + 1);
        while(holidays.includes(nextDay.toISOString().slice(0,10)))
          nextDay.setDate(nextDay.getDate() + 1);
        if(prevDay.toISOString().slice(0,10) === dk) total += 120;
        if(nextDay.toISOString().slice(0,10) === dk) total += 120;
      } else {
        // 일반 배송: 해당일 240분
        if(startDk === dk) total += 240;
      }
    }
  });
  return total;
}

function getEffectiveOutDate(entry, holidays) {
  // 출고일(시작일)이 휴무면 전날 근무일로
  let d = new Date(entry.startDate);
  while(holidays.includes(d.toISOString().slice(0,10))) {
    d.setDate(d.getDate() - 1);
  }
  return d.toISOString().slice(0,10);
}

function getEffectiveInDate(entry, holidays) {
  // 입고일 = 시작일 + (days-1), 휴무면 다음 근무일로
  let d = new Date(entry.startDate);
  d.setDate(d.getDate() + entry.days - 1);
  while(holidays.includes(d.toISOString().slice(0,10))) {
    d.setDate(d.getDate() + 1);
  }
  return d.toISOString().slice(0,10);
}

// 목록 소요시간 표시용 (원래 날짜 기준)
function calcMinsForDate(entry, targetDk) {
  const start = new Date(entry.startDate);
  const target = new Date(targetDk);
  const diff = Math.round((target - start) / 86400000);
  const lastDay = entry.days - 1;

  const isOriginalOut = diff === 0;
  const isOriginalIn  = (entry.days === 1 && diff === 0) || (entry.days > 1 && diff === lastDay);

  if(entry.days === 1) {
    if(isOriginalOut) return entry.baseMins;
  } else {
    let mins = 0;
    if(isOriginalOut) mins += entry.baseMins / 2;
    if(isOriginalIn)  mins += entry.baseMins / 2;
    return mins;
  }
  return 0;
}

// 부하율 전용 (effective 날짜 기준, 휴무일 반영)
function calcMinsForLoad(entry, targetDk) {
  const holidays = getHolidays();
  const startDk = entry.startDate;
  const isStartHoliday = holidays.includes(startDk);

  // 마지막날 계산 (입고일)
  let lastDate = new Date(startDk);
  lastDate.setDate(lastDate.getDate() + entry.days - 1);
  const lastDk = lastDate.toISOString().slice(0,10);
  const isLastHoliday = holidays.includes(lastDk);

  // 출고 effective 날짜 (시작일이 휴무면 전날)
  const effectiveOut = getEffectiveOutDate(entry, holidays);
  // 입고 effective 날짜 (입고일이 휴무면 다음날)
  const effectiveIn  = getEffectiveInDate(entry, holidays);

  let mins = 0;

  if(entry.days === 1) {
    if(isStartHoliday) {
      // 1일 임대인데 휴무일 → 출고는 전날(반타임), 입고는 다음날(반타임)
      if(effectiveOut === targetDk) mins += entry.baseMins / 2;
      if(effectiveIn  === targetDk) mins += entry.baseMins / 2;
    } else {
      // 일반 1일 임대 → 당일 전타임
      if(effectiveOut === targetDk) mins += entry.baseMins;
    }
  } else {
    // 2~3일 임대
    if(effectiveOut === targetDk) mins += entry.baseMins / 2;
    if(effectiveIn  === targetDk) mins += entry.baseMins / 2;
  }
  return mins;
}


function collectInoutForDate(dk) {
  const results = [];
  Object.keys(state).forEach(startDk => {
    // 현재 선택된 사업소만 필터
    const targetSites = curSite === '전체' ? ['본소','북부'] : [curSite];
    targetSites.forEach(site => {
      if(!state[startDk] || !state[startDk][site]) return;
      state[startDk][site].entries.forEach(e => {
        const start = new Date(e.startDate);
        const target = new Date(dk);
        const diff = Math.round((target - start) / 86400000);
        const lastDay = e.days - 1;
        if(diff === 0 && !e.outDone) {
          results.push({ entry: e, type: 'out', dayNum: 1 });
        }
        if(e.days === 1 && diff === 0 && e.outDone && !e.inDone) {
          results.push({ entry: e, type: 'in', dayNum: 1 });
        }
        if(e.days > 1 && diff === lastDay && !e.inDone) {
          results.push({ entry: e, type: 'in', dayNum: e.days });
        }
      });
    });
  });
  return results;
}

function renderTriDayPanel() {
  const panel = document.getElementById('triDayPanel');

  const dk = getDkeys()[curIdx];
  const d = getDates()[curIdx];
  const DOW2 = ['일','월','화','수','목','금','토'];
  const holidays = getHolidays();
  const targetSites = curSite==='전체' ? ['본소','북부'] : [curSite];

  let colsHtml = '';
  [-1,0,1].forEach(offset => {
    const dd = new Date(d);
    dd.setDate(dd.getDate() + offset);
    const colDk = dd.toISOString().slice(0,10);
    const label = (dd.getMonth()+1)+'/'+ dd.getDate()+'('+DOW2[dd.getDay()]+')';
    const isHol = holidays.includes(colDk);
    const isTod = offset===0;
    const hdrColor = isHol?'#ef4444':isTod?'#818cf8':'#94a3b8';
    const hdrBg = isTod?'rgba(99,102,241,.1)':'';

    // entries 수집
    const rows = [];
    Object.keys(state).forEach(startDk => {
      targetSites.forEach(site => {
        if(!state[startDk]||!state[startDk][site]) return;
        state[startDk][site].entries.forEach((e,ei) => {
          const diff = Math.round((new Date(colDk)-new Date(e.startDate))/86400000);
          const inDkD = new Date(e.startDate);
          inDkD.setDate(inDkD.getDate()+e.days-1);
          const inDk = inDkD.toISOString().slice(0,10);
          const isOut = diff===0;
          const isIn  = inDk===colDk;
          const isPastOut = e.outDone&&!e.inDone&&isIn;
          if(!isOut&&!isIn&&!isPastOut) return;
          let tc = isOut&&e.days===1?'#eab308':(!isOut&&(isIn||isPastOut))?'#64748b':'#22c55e';
          rows.push({e,ei,site,startDk,isOut,isIn:isIn||isPastOut,tc});
        });
      });
    });

    // 정렬: 회색(입고,기간긴순) → 노란(1일,성명순) → 초록(출고,기간짧은순)
    rows.sort((a,b)=>{
      // 1순위: 그룹 (입고→1일→출고)
      const typeOrder = {'#64748b':0,'#eab308':1,'#22c55e':2};
      const ga = typeOrder[a.tc], gb2 = typeOrder[b.tc];
      if(ga !== gb2) return ga - gb2;
      // 2순위: 기간 정렬
      if(a.tc === '#64748b' && a.e.days !== b.e.days) return b.e.days - a.e.days; // 입고: 긴순
      if(a.tc === '#22c55e' && a.e.days !== b.e.days) return a.e.days - b.e.days; // 출고: 짧은순
      // 3순위: 성명 가나다
      return (a.e.personName||'').localeCompare(b.e.personName||'','ko');
    });

    const outN = rows.filter(r=>r.isOut&&!r.e.outDone).length;
    const inN  = rows.filter(r=>r.isIn&&!r.e.inDone).length;

    let rowsHtml = rows.length===0
      ? '<p style="padding:12px;text-align:center;color:#64748b;font-size:11px;margin:0">없음</p>'
      : rows.map(r=>`
        <div style="display:flex;align-items:center;gap:4px;padding:5px 8px;border-bottom:1px solid #1e293b;border-left:3px solid ${r.tc}">
          <span style="font-weight:700;color:#f1f5f9;font-size:11px;min-width:44px;flex-shrink:0">${r.e.personName||''}</span>
          ${r.isOut?`<label style="display:inline-flex;align-items:center;gap:2px;cursor:pointer;flex-shrink:0"><input type="checkbox" ${r.e.outDone?'checked':''} onchange="toggleEntryCheckInline('${r.startDk}','${r.site}',${r.ei},'out',this.checked)" style="width:13px;height:13px"><span style="color:#60a5fa;font-size:10px">출고</span></label>`:'<span style="width:40px"></span>'}
          ${r.isIn?`<label style="display:inline-flex;align-items:center;gap:2px;cursor:pointer;flex-shrink:0"><input type="checkbox" ${r.e.inDone?'checked':''} onchange="toggleEntryCheckInline('${r.startDk}','${r.site}',${r.ei},'in',this.checked)" style="width:13px;height:13px"><span style="color:#34d399;font-size:10px">입고</span></label>`:'<span style="width:40px"></span>'}
          <span style="color:#64748b;font-size:10px;flex-shrink:0">${r.e.days}일</span>
          <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#e2e8f0;font-size:11px">${r.e.equipName||''}${r.e.delivery?' 🚚':''}</span>
          <span style="color:#64748b;font-size:10px;flex-shrink:0">${calcMinsForDate(r.e,colDk)}분</span>
          <button onclick="openEditModal('${r.startDk}','${r.site}',${r.ei})" style="width:18px;height:18px;background:transparent;border:1px solid #334155;border-radius:4px;color:#94a3b8;font-size:10px;cursor:pointer;flex-shrink:0;padding:0">✏️</button>
          <button onclick="delEntry('${r.site}',${r.ei},'${r.startDk}')" style="width:18px;height:18px;background:transparent;border:1px solid #334155;border-radius:4px;color:#94a3b8;font-size:11px;cursor:pointer;flex-shrink:0;padding:0">✕</button>
        </div>`).join('');

    colsHtml += `
    <div style="background:#1e293b;border:${isTod?'2px solid #818cf8':'1px solid #334155'};border-radius:10px;overflow:hidden;display:flex;flex-direction:column;min-height:200px;${isTod?'box-shadow:0 0 0 2px rgba(129,140,248,.2)':''}">
      <div style="padding:8px 12px;background:${hdrBg};border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:${isTod?'16':'12'}px;font-weight:${isTod?'900':'700'};color:${hdrColor};letter-spacing:${isTod?'-0.3px':'0'}">${label}${isHol?' 🔴':''}</span>
        <span style="font-size:10px;color:#64748b">출고${outN}/입고${inN}</span>
      </div>

      <div style="flex:1;overflow-y:auto">${rowsHtml}</div>
    </div>`;
  });

  panel.innerHTML = colsHtml;
}

  });

  const todayD = selD;
  const colDks = cols.map(c => c.dk); // 3일 범위 날짜

  document.getElementById('popupDateLabel').textContent =
    todayD.getFullYear() + '년 ' + (todayD.getMonth()+1) + '월 ' + todayD.getDate() + '일 기준'
    + (curSite !== '전체' ? ' [' + curSite + ']' : ' [전체]');

  const taskMap = {}; // key → {entry, site, startDk, outDk, inDk}

  Object.keys(state).forEach(startDk => {

    targetSites.forEach(site => {
      if(!state[startDk]||!state[startDk][site]) return;
      state[startDk][site].entries.forEach(e => {
        const start   = new Date(e.startDate);
        const outDk   = e.startDate; // 출고일 = 시작일
        const inDate  = new Date(e.startDate);
        inDate.setDate(inDate.getDate() + e.days - 1);
        const inDk    = inDate.toISOString().slice(0,10); // 입고일

        // 이 entry가 3일 범위와 관련 있는지 판단
        const outInRange = colDks.includes(outDk);
        const inInRange  = colDks.includes(inDk);

        // 할 일이 있는지 (미완결)
        const needOut = outInRange && !e.outDone;
        const needIn  = inInRange  && !e.inDone;

        // 1일 임대 특수처리: 출고 완료됐는데 입고 미완 → 입고만
        const needInOnly = (e.days === 1 && e.outDone && !e.inDone && inInRange);

        const key = e.id;
        taskMap[key] = {
          entry: e, site, startDk, outDk, inDk,
          showOut: needOut,
          showIn:  needIn || needInOnly,
        };
      });
    });
  });

  const tasks = Object.values(taskMap);

  // 총 건수 계산
  const totalOut = tasks.filter(t => t.showOut).length;
  const totalIn  = tasks.filter(t => t.showIn).length;

    // 이 날짜의 미완결 건수
    const colOut = tasks.filter(t => t.showOut && t.outDk === col.dk).length;
    const colIn  = tasks.filter(t => t.showIn  && t.inDk  === col.dk).length;
    let sub = '';
